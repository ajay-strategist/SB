<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://wzqraqooarfoxkinuyic.supabase.co; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://wzqraqooarfoxkinuyic.supabase.co; connect-src 'self' https://wzqraqooarfoxkinuyic.supabase.co;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MentorFile — Digital College Mentorship System for St. Berchmans College. Secure login for Admin, Mentor, HOD, Student, and Parent.">
  <title>Login — MentorFile | St. Berchmans College</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="SB Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/motion.css">
  <style>
    .auth-tabs {
      display: flex;
      background: var(--bg-surface-2);
      border-radius: var(--border-radius-md);
      padding: 3px;
      margin-bottom: var(--space-5);
    }
    .auth-tab-btn {
      flex: 1;
      padding: var(--space-2) var(--space-1);
      border: none;
      background: none;
      border-radius: calc(var(--border-radius-md) - 2px);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: inherit;
      white-space: nowrap;
    }
    .auth-tab-btn.active {
      background: var(--bg-surface);
      color: var(--brand-primary);
      box-shadow: var(--shadow-xs);
    }
    .invite-link-box {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: var(--border-radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--font-size-xs);
      color: #065F46;
      word-break: break-all;
      margin-top: var(--space-3);
      display: none;
    }
    [data-theme="dark"] .invite-link-box { color: #6EE7B7; }
    .theme-btn-fixed {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 100;
    }
    .auth-page-centered {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-6) var(--space-4);
      background: var(--bg-base);
    }
    .auth-page-centered .auth-panel-right {
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      border-radius: var(--border-radius-xl);
    }
  </style>
</head>
<body>
  <button class="btn btn-secondary btn-sm theme-btn-fixed" onclick="Theme.toggle();updateThemeBtn()" id="theme-toggle-btn" aria-label="Toggle dark mode">
    <span id="theme-icon"></span>
  </button>

  <div class="auth-page auth-page-centered">
    <!-- Login Panel -->
    <div class="auth-panel-right">
      <div style="text-align:center;margin-bottom:var(--space-5);">
        <img src="SB Logo.png" alt="St. Berchmans College" style="height:56px;">
      </div>
      <div class="auth-form-header">
        <h2>Welcome back</h2>
        <p>Sign in with your personal email address and password.</p>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="doLogin(event)" novalidate>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label required" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="your.email@example.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label required" for="login-password">Password</label>
          <div class="password-input-wrap">
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="password-toggle" onclick="togglePwd('login-password')" aria-label="Show/hide password">
              <span id="login-pwd-eye"></span>
            </button>
          </div>
        </div>

        <div class="auth-form-actions">
          <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm);cursor:pointer">
            <input type="checkbox" id="remember-me"> Remember me
          </label>
          <a href="pages/forgot-password.html" class="auth-link">Forgot password?</a>
        </div>

        <div id="login-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <div style="margin-top:var(--space-6);text-align:center">
        <p style="font-size:var(--font-size-xs);color:var(--text-tertiary)">
          Don't have an account? Your institution admin will send you an invite email.
        </p>
      </div>

      <div style="margin-top:var(--space-5);padding-top:var(--space-4);border-top:1px solid var(--border-subtle);text-align:center;">
        <div style="font-size:10px;color:var(--text-tertiary);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;margin-bottom:var(--space-2);">Powered by</div>
        <img src="KVJ analytics Logo.png" alt="KVJ Analytics" style="height:32px;width:auto;opacity:0.85;">
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js" integrity="sha512-omCJ8S/xl+DUjxNTqvhVSptHwIEi0IDp52n63HEj8ThJgSK/8Lcpi9btnTdE8db+Y4cDKZrZ7NQZBX4PKN4i4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="js/motion.js"></script>
  <script>
    // Redirect if already logged in
    if (DB.isSessionValid()) {
      const s = DB.getSession();
      redirectToRoleDashboard(s.role);
    }

    // Update theme button
    function updateThemeBtn() {
      document.getElementById('theme-icon').innerHTML = Icons.bulb;
      document.getElementById('theme-toggle-btn').title = Theme.get() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
    }
    updateThemeBtn();

    // Load stats and college info
    window.addEventListener('DOMContentLoaded', async () => {
      await DB.init();

      // Eye icon
      document.getElementById('login-pwd-eye').innerHTML = Icons.eye;

      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.info('[PWA] Service Worker registered: ', reg.scope))
            .catch(err => console.error('[PWA] Service Worker registration failed: ', err));
        });
      }

      // Stagger cascade right panel elements on load
      if (!Motion.isReduced() && window.gsap) {
        window.gsap.from([
          '.auth-form-header h2',
          '.auth-form-header p',
          '#login-form .form-group:nth-of-type(1)',
          '#login-form .form-group:nth-of-type(2)',
          '.auth-form-actions',
          '#login-btn',
          '.auth-panel-right > div:last-child'
        ], {
          y: 24,
          opacity: 0,
          duration: 0.4,
          stagger: 0.08,
          ease: 'power2.out',
          clearProps: 'all'
        });
      }
    });

    function resetDemoData() {
      if (!confirm('This clears all local data and reloads fresh demo data. Continue?')) return;
      localStorage.clear();
      location.reload();
    }

    function autofill(email, password) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = password;
      document.getElementById('login-email').focus();
    }

    async function doLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;

      // Morph button to loading spinner state
      if (!Motion.isReduced() && window.gsap) {
        window.gsap.to(btn, {
          width: '48px',
          borderRadius: '50%',
          padding: '0',
          duration: 0.24,
          ease: 'power2.out',
          onComplete: () => {
            btn.innerHTML = `<div class="loading-spinner" style="margin:0 auto;"></div>`;
          }
        });
      } else {
        btn.innerHTML = `<span class="loading-spinner"></span> Signing in…`;
      }

      const result = await DB.login(email, password);

      if (!result.ok) {
        // Revert button styling
        if (!Motion.isReduced() && window.gsap) {
          btn.innerHTML = 'Sign In';
          window.gsap.to(btn, {
            width: '100%',
            borderRadius: 'var(--border-radius-lg)',
            padding: 'var(--space-3) var(--space-4)',
            duration: 0.24,
            ease: 'power2.out',
            onComplete: () => {
              btn.disabled = false;
            }
          });
        } else {
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }

        errEl.style.display = 'flex';
        errEl.innerHTML = `<div class="auth-error">${Icons.alert} ${Str.escHtml(result.error)}</div>`;
        
        // Add form shake on validation error
        const formEl = document.getElementById('login-form');
        formEl.classList.remove('shake-error');
        void formEl.offsetWidth; // Trigger reflow
        formEl.classList.add('shake-error');
        setTimeout(() => formEl.classList.remove('shake-error'), 480);
        return;
      }

      // Success checkmark animation and redirect
      Toast.success('Welcome back!', `Signed in as ${result.user.name}`);
      if (!Motion.isReduced() && window.gsap) {
        Motion.successCheck(btn, () => {
          setTimeout(() => redirectToRoleDashboard(result.session.role), 320);
        });
      } else {
        setTimeout(() => redirectToRoleDashboard(result.session.role), 500);
      }
    }
  </script>
</body>
</html>
