<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MentorFile — Digital College Mentorship System for St. Berchmans College. Secure login for Admin, Mentor, HOD, Student, and Parent.">
  <title>Login — MentorFile | St. Berchmans College</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="SB Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .auth-tabs {
      display: flex;
      background: var(--bg-surface-2);
      border-radius: var(--border-radius-md);
      padding: 3px;
      margin-bottom: var(--space-5);
    }
    .auth-tab-btn {
      flex: 1;
      padding: var(--space-2) var(--space-1);
      border: none;
      background: none;
      border-radius: calc(var(--border-radius-md) - 2px);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: inherit;
      white-space: nowrap;
    }
    .auth-tab-btn.active {
      background: var(--bg-surface);
      color: var(--brand-primary);
      box-shadow: var(--shadow-xs);
    }
    .invite-link-box {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: var(--border-radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--font-size-xs);
      color: #065F46;
      word-break: break-all;
      margin-top: var(--space-3);
      display: none;
    }
    [data-theme="dark"] .invite-link-box { color: #6EE7B7; }
    .theme-btn-fixed {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 100;
    }
  </style>
</head>
<body>
  <button class="btn btn-secondary btn-sm theme-btn-fixed" onclick="Theme.toggle();updateThemeBtn()" id="theme-toggle-btn" aria-label="Toggle dark mode">
    <span id="theme-icon"></span>
  </button>

  <div class="auth-page">
    <!-- Left Branding Panel -->
    <div class="auth-panel-left" style="background-image: linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.86)), url('SB Background Image.jpg'); background-size: cover; background-position: center;">
      <div class="auth-brand">
        <img src="SB Logo.png" alt="St. Berchmans College" id="college-logo-brand" style="height:72px;">
      </div>

      <div class="auth-hero">
        <div class="auth-hero-tagline">The <span>Digital</span><br>Mentor's File</div>
      </div>
    </div>

    <!-- Right Login Panel -->
    <div class="auth-panel-right">
      <div class="auth-form-header">
        <h2>Welcome back</h2>
        <p>Sign in with your personal email address and password.</p>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="doLogin(event)" novalidate>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label required" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="your.email@example.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label required" for="login-password">Password</label>
          <div class="password-input-wrap">
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="password-toggle" onclick="togglePwd('login-password')" aria-label="Show/hide password">
              <span id="login-pwd-eye"></span>
            </button>
          </div>
        </div>

        <div class="auth-form-actions">
          <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm);cursor:pointer">
            <input type="checkbox" id="remember-me"> Remember me
          </label>
          <a href="pages/forgot-password.html" class="auth-link">Forgot password?</a>
        </div>

        <div id="login-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <div style="margin-top:var(--space-6);text-align:center">
        <p style="font-size:var(--font-size-xs);color:var(--text-tertiary)">
          Don't have an account? Your institution admin will send you an invite email.
        </p>
        <p style="font-size:11px;color:var(--text-tertiary);margin-top:var(--space-3)">
          <a href="#" class="auth-link" onclick="resetDemoData();return false;">Reset demo data</a> — reloads fresh sample data (needed after an update).
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (DB.isSessionValid()) {
      const s = DB.getSession();
      redirectToRoleDashboard(s.role);
    }

    // Update theme button
    function updateThemeBtn() {
      const isDark = Theme.get() === 'dark';
      document.getElementById('theme-icon').innerHTML = isDark ? Icons.sun : Icons.moon;
      document.getElementById('theme-toggle-btn').title = isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode';
    }
    updateThemeBtn();

    // Load stats and college info
    window.addEventListener('DOMContentLoaded', async () => {
      await DB.init();

      // Eye icon
      document.getElementById('login-pwd-eye').innerHTML = Icons.eye;

      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.info('[PWA] Service Worker registered: ', reg.scope))
            .catch(err => console.error('[PWA] Service Worker registration failed: ', err));
        });
      }
    });

    function resetDemoData() {
      if (!confirm('This clears all local data and reloads fresh demo data. Continue?')) return;
      localStorage.clear();
      location.reload();
    }

    function autofill(email, password) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = password;
      document.getElementById('login-email').focus();
    }

    async function doLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = `<span class="loading-spinner"></span> Signing in…`;

      const result = await DB.login(email, password);

      btn.disabled = false;
      btn.innerHTML = 'Sign In';

      if (!result.ok) {
        errEl.style.display = 'flex';
        errEl.innerHTML = `<div class="auth-error">${Icons.alert} ${result.error}</div>`;
        return;
      }

      Toast.success('Welcome back!', `Signed in as ${result.user.name}`);
      setTimeout(() => redirectToRoleDashboard(result.session.role), 500);
    }
  </script>
</body>
</html>
