<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://wzqraqooarfoxkinuyic.supabase.co; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://wzqraqooarfoxkinuyic.supabase.co; connect-src 'self' https://wzqraqooarfoxkinuyic.supabase.co;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../SB Logo.png">
  <title>Mentor Dashboard — MentorFile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/motion.css">
  <style>
    .mentee-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-5);
    }
    .profile-section-title {
      font-size: var(--font-size-base);
      font-weight: 700;
      color: var(--brand-primary);
      margin: var(--space-6) 0 var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--border-color);
    }
    .avatar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-6);
      background: var(--bg-surface-2);
      border-radius: var(--border-radius-lg);
    }
    /* Traits score styling */
    .trait-rating {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }
    .trait-label {
      flex: 1;
      font-size: var(--font-size-sm);
      font-weight: 500;
    }
    .rating-dots {
      display: flex;
      gap: 4px;
    }
    .rating-dot-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border-color-strong);
      background: var(--bg-surface);
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
    .rating-dot-btn.active {
      background: var(--brand-primary);
      color: white;
      border-color: var(--brand-primary);
    }
    .sig-display-box {
      border: 1px dashed var(--border-color-strong);
      border-radius: var(--border-radius-md);
      padding: var(--space-4);
      background: var(--bg-surface-2);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn {
      margin-bottom: var(--space-5);
    }
    .qual-card {
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: var(--space-4);
      background: var(--bg-surface);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .qual-card:hover { border-color: var(--border-color-strong); box-shadow: var(--shadow-xs); }
    .qual-rate .rating-dot-btn { width: 30px; height: 30px; font-weight: 600; }
    .qual-rate .rating-dot-btn.active { background: var(--brand-primary); color: #fff; border-color: var(--brand-primary); }
    /* Meeting Report */
    .mr-block { border-radius: var(--border-radius-lg); padding: var(--space-5); margin-bottom: var(--space-5); border-left: 4px solid var(--brand-primary); background: var(--bg-surface-2); }
    .mr-block h4 { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-sm); font-weight: 700; margin: 0 0 var(--space-3); text-transform: uppercase; letter-spacing: 0.03em; }
    .mr-block h4 svg { width: 18px; height: 18px; }
    .mr-item { display: flex; gap: var(--space-4); padding: var(--space-3) 0; border-bottom: 1px dashed var(--border-color); align-items: baseline; }
    .mr-item:last-child { border-bottom: none; }
    .mr-date { flex-shrink: 0; font-size: 11px; font-weight: 600; color: var(--text-tertiary); min-width: 92px; }
    .mr-text { font-size: var(--font-size-sm); color: var(--text-primary); line-height: 1.55; }
    .mr-goals { border-left-color: #059669; }
    .mr-goals h4 { color: #047857; }
    .mr-disc { border-left-color: #4F46E5; }
    .mr-disc h4 { color: #4338CA; }
    .mr-conf { border-left-color: #DC2626; background: rgba(220,38,38,0.04); }
    .mr-conf h4 { color: #B91C1C; }
    .mr-empty { color: var(--text-tertiary); font-size: var(--font-size-sm); padding: var(--space-2) 0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Mobile overlay -->
    <div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div id="sidebar-content"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <nav class="breadcrumb" id="breadcrumb">
            <span>Mentor</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="current" id="breadcrumb-current">Dashboard</span>
          </nav>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="Theme.toggle()" title="Toggle theme" aria-label="Toggle dark mode">
            <span id="theme-icon-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span>
          </button>
          <button class="header-btn" onclick="showNotifications()" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="badge" id="notif-badge" style="display:none">0</span>
          </button>
        </div>
      </header>

      <!-- Page Content Container -->
      <div class="page-content" id="page-content">
        <div class="page-loader">
          <div style="width:100%;max-width:1200px;padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-6);">
            <div style="height:32px;width:240px;" class="skeleton-shimmer"></div>
            <div style="height:20px;width:360px;margin-bottom:var(--space-4);" class="skeleton-shimmer"></div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:var(--space-4);">
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
            </div>
            <div style="height:300px;width:100%;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js" integrity="sha512-omCJ8S/xl+DUjxNTqvhVSptHwIEi0IDp52n63HEj8ThJgSK/8Lcpi9btnTdE8db+Y4cDKZrZ7NQZBX4PKN4i4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="../js/motion.js"></script>
  <script>
    let session;
    let selectedStudentId = null;
    let activeSubTab = 'profile';
    let currentRecordSemester = 1;

    window.addEventListener('DOMContentLoaded', async () => {
      await DB.init();
      session = requireAuth(['mentor']);
      if (!session) return;

      buildMentorSidebar();
      updateThemeIcon();
      updateNotifBadge();
      renderDashboard();
    });

    function buildMentorSidebar() {
      const college = DB.Settings.getCollegeInfo();
      document.getElementById('sidebar-content').innerHTML = `
        <div class="sidebar-logo">
          <img src="../SB Logo.png" alt="St. Berchmans College" style="height:42px;object-fit:contain">
          <div class="sidebar-logo-text"><p>Teacher Portal</p></div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-label">Overview</div>
            <button class="nav-item active" id="nav-dashboard" onclick="showMentorTab('dashboard')">${Icons.home}<span class="nav-item-text">Dashboard</span></button>
            <button class="nav-item" id="nav-class" onclick="showMentorTab('class')">${Icons.grid}<span class="nav-item-text">Class</span></button>
            <button class="nav-item" id="nav-settings" onclick="showUserMenu()">${Icons.settings}<span class="nav-item-text">Profile & Settings</span></button>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" onclick="showUserMenu()">
            ${renderAvatar(session.name, 'sm')}
            <div class="sidebar-user-info">
              <div class="name">${session.name}</div>
              <div class="role">${roleLabel(session.role)}</div>
            </div>
          </div>
          <button class="btn btn-danger btn-full btn-sm" style="margin-top:var(--space-3)" onclick="logout()">${Icons.logOut}<span style="margin-left:6px">Sign Out</span></button>
        </div>`;
    }

    // ── Top-level tab navigation (Dashboard | Class [Class/Students view]) ──
    let mentorTab = 'dashboard';
    let classViewMode = 'class'; // 'class' | 'students'
    function showMentorTab(tab) {
      const navEl = document.getElementById(`nav-${tab}`);
      if (navEl) Motion.glidePill(document.querySelector('.sidebar-nav'), navEl);
      
      Motion.transition(document.getElementById('page-content'), () => {
        mentorTab = tab; selectedStudentId = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        navEl?.classList.add('active');
        if (tab === 'dashboard') renderDashboard();
        else if (tab === 'class') renderClassTab();
      });
    }

    // My students (assigned mentees)
    function myStudents() {
      return DB.Assignments.getMentees(session.userId).map(id => DB.Users.getById(id)).filter(Boolean);
    }

    function renderClassTab() {
      document.getElementById('breadcrumb-current').textContent = 'Class';
      const container = document.getElementById('page-content');
      const students = myStudents();
      // Group my students by class (course) — only classes where I have students
      const byCourse = {};
      students.forEach(s => { (byCourse[s.courseId] = byCourse[s.courseId] || []).push(s); });

      const classView = `
        <div class="mentee-grid">
          ${Object.keys(byCourse).map(cid => {
            const course = DB.Courses.getById(cid);
            const cs = byCourse[cid];
            return `<div class="section-card"><div class="section-card-body">
              <div class="font-semibold">${course?.name || 'Class'}</div>
              <div class="text-xs text-muted">${course?.semesterCount || 6} semesters</div>
              <hr class="divider"><div class="text-sm"><strong>My students here:</strong> ${cs.length}</div>
              <button class="btn btn-secondary btn-sm mt-3" onclick="showClassStudents('${cid}')">View Students</button>
            </div></div>`;
          }).join('') || '<div class="empty-state"><p>No classes — you have no assigned students yet.</p></div>'}
        </div>`;

      container.innerHTML = `
        <div class="page-header"><h1 class="page-title">My Class</h1><p class="page-subtitle">Only your assigned students are shown.</p></div>
        <div class="tabs" style="margin-bottom:var(--space-5)">
          <button class="tab-btn ${classViewMode==='class'?'active':''}" onclick="setClassView('class')">Class View</button>
          <button class="tab-btn ${classViewMode==='students'?'active':''}" onclick="setClassView('students')">Students View</button>
        </div>
        <div id="class-view-body">${classViewMode === 'class' ? classView : studentsTableHTML(students)}</div>`;
    }
    function setClassView(mode) { classViewMode = mode; renderClassTab(); }
    function showClassStudents(cid) {
      classViewMode = 'students';
      renderClassTab();
      const students = myStudents().filter(s => s.courseId === cid);
      document.getElementById('class-view-body').innerHTML = studentsTableHTML(students);
    }

    function currentSemAttendance(studentId) {
      const recs = DB.SemesterRecords.getAll(studentId);
      const latest = recs[recs.length - 1];
      return latest && latest.attendance != null ? latest.attendance + '%' : '—';
    }

    function studentsTableHTML(students) {
      return `<div class="section-card"><div class="table-wrapper"><table class="data-table">
        <thead><tr><th>Student</th><th>Class</th><th>Attendance (Current Sem)</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${students.map(s => {
          const course = DB.Courses.getById(s.courseId);
          return `<tr>
            <td><div class="flex items-center gap-3">${renderAvatar(s.name,'sm',null,s.id)}<span class="font-semibold text-sm" style="view-transition-name:name-${s.id};width:fit-content">${Str.escHtml(s.name)}</span></div></td>
            <td class="text-sm">${Str.escHtml(course?.name || '—')}</td>
            <td>${currentSemAttendance(s.id)}</td>
            <td>${renderStatusBadge(DB.Analytics.getStudentStatus(s.id))}</td>
            <td><div class="flex gap-2">
              <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="viewMenteeFile('${s.id}')">${Icons.fileText} Report</button>
              <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="scheduleMeetingFor('${s.id}')" title="Schedule Meeting">${Icons.calendar}</button>
              <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="referToHOD('${s.id}')" title="Refer to HOD">${Icons.link}</button>
              ${s.parentEmail ? (s.parentApproved
                ? `<button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="setParentApproval('${s.id}',false)"><span class="badge badge-green">${Icons.check} Parent OK</span></button>`
                : `<button class="btn btn-primary btn-sm hover-lift press-scale" onclick="setParentApproval('${s.id}',true)">Approve Parent</button>`) : ''}
            </div></td>
          </tr>`;
        }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-tertiary);padding:var(--space-6)">No students.</td></tr>'}</tbody>
      </table></div></div>`;
    }

    // Refer a student to the HOD
    function referToHOD(studentId) {
      const s = DB.Users.getById(studentId);
      const hod = DB.Users.getAll().find(u => u.role === 'hod' && u.departmentId === session.departmentId);
      if (!hod) { Toast.warning('No HOD found', 'No HOD is set for your department.'); return; }
      Modal.create('refer', {
        title: `Refer ${Str.escHtml(s.name)} to HOD`, size: 'sm',
        body: `<div class="form-group"><label class="form-label">Reason / note for HOD</label><textarea class="form-textarea" id="refer-note" rows="3" placeholder="e.g. Please speak with this student regarding attendance."></textarea></div>`,
        footer: `<button class="btn btn-secondary hover-lift press-scale" onclick="Modal.close('refer')">Cancel</button><button class="btn btn-primary hover-lift press-scale" onclick="doRefer('${studentId}','${hod.id}')">Send Referral</button>`,
      });
    }
    function doRefer(studentId, hodId) {
      const s = DB.Users.getById(studentId);
      const note = document.getElementById('refer-note').value.trim();
      DB.Notifications.create(hodId, 'Student Referred by Teacher', `${session.name} referred ${s.name}. ${note}`, 'warning');
      Toast.success('Referred', 'The HOD has been notified.');
      Modal.close('refer');
    }

    // Visible parent-approval control (Teacher)
    function setParentApproval(studentId, approve) {
      if (approve) DB.ParentLinks.approve(studentId, session.userId);
      else DB.ParentLinks.revoke(studentId, session.userId);
      Toast.success(approve ? 'Parent Approved' : 'Access Revoked', approve ? 'Parent can now view the report.' : 'Parent access revoked.');
      renderClassTab();
    }

    function toggleSidebar() {
      const s = document.getElementById('sidebar');
      if (window.innerWidth <= 768) {
        s.classList.toggle('mobile-open');
        document.getElementById('mobile-overlay').classList.toggle('show');
      } else {
        s.classList.toggle('collapsed');
      }
    }

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('mobile-overlay').classList.remove('show');
    }

    function updateThemeIcon() {
      const isDark = Theme.get() === 'dark';
      document.getElementById('theme-icon-header').innerHTML = isDark ? Icons.sun : Icons.moon;
    }

    Theme._origToggle = Theme.toggle;
    Theme.toggle = () => { Theme._origToggle(); updateThemeIcon(); };

    function updateNotifBadge() {
      const count = DB.Notifications.getUnread(session.userId).length;
      const badge = document.getElementById('notif-badge');
      badge.style.display = count > 0 ? 'flex' : 'none';
      badge.textContent = count;
    }

    function showNotifications() {
      const notifs = DB.Notifications.getForUser(session.userId);
      DB.Notifications.markAllRead(session.userId);
      updateNotifBadge();
      Modal.create('notifs', {
        title: 'Notifications',
        body: notifs.length ? notifs.map(n => `
          <div style="padding:var(--space-3) 0;border-bottom:1px solid var(--border-color)">
            <div style="font-weight:600;font-size:var(--font-size-sm);color:var(--text-primary)">${n.title}</div>
            <div style="font-size:var(--font-size-xs);color:var(--text-secondary);margin-top:2px">${n.message}</div>
            <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${DateFmt.relativeTime(n.createdAt)}</div>
          </div>`).join('') : '<div class="empty-state"><p>No notifications.</p></div>',
        footer: `<button class="btn btn-secondary" onclick="Modal.close('notifs')">Close</button>`,
      });
    }

    // ── Dashboard ────────────────────────────────────────────────
    function renderDashboard() {
      selectedStudentId = null;
      document.getElementById('breadcrumb-current').textContent = 'Dashboard';
      const container = document.getElementById('page-content');
      
      const studentIds = DB.Assignments.getMentees(session.userId);
      const students = studentIds.map(id => DB.Users.getById(id)).filter(Boolean);

      const statusStats = { green: 0, yellow: 0, red: 0, gray: 0 };
      students.forEach(s => {
        statusStats[DB.Analytics.getStudentStatus(s.id)]++;
      });

      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">Mentor Dashboard</h1>
          <p class="page-subtitle">Welcome back, ${session.name}. Here are your assigned mentees.</p>
        </div>

        <div class="stats-grid">
          ${statCard('Total Mentees', students.length, Icons.users, 'linear-gradient(135deg, #4F46E5, #6366F1)')}
          ${statCard('On Track', statusStats.green, Icons.check_circle, 'linear-gradient(135deg, #059669, #10B981)')}
          ${statCard('Needs Attention', statusStats.yellow, Icons.info, 'linear-gradient(135deg, #F59E0B, #FBBF24)')}
          ${statCard('At Risk', statusStats.red, Icons.alert, 'linear-gradient(135deg, #DC2626, #EF4444)')}
        </div>

        ${(() => {
          const flagged = students.filter(s => DB.Analytics.getStudentStatus(s.id) !== 'green');
          if (!flagged.length) return '';
          return `<div class="section-card mb-6">
            <div class="section-card-header"><div class="section-card-title">${Icons.alert} Need Attention & At Risk</div></div>
            <div class="section-card-body" style="padding:0">
              ${flagged.map(s => {
                const status = DB.Analytics.getStudentStatus(s.id);
                const course = DB.Courses.getById(s.courseId);
                return `<div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3 var(--space-5));border-bottom:1px solid var(--border-color);cursor:pointer" onclick="viewMenteeFile('${s.id}')">
                  ${renderAvatar(s.name,'sm',null,s.id)}
                  <div style="flex:1;min-width:0"><div class="font-semibold text-sm" style="view-transition-name:name-${s.id};width:fit-content">${s.name}</div><div class="text-xs text-muted">${course?.name || '—'} · Attendance ${currentSemAttendance(s.id)}</div></div>
                  ${renderStatusBadge(status)}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        })()}

        <div class="section-card">
          <div class="section-card-header">
            <div class="section-card-title">${Icons.book} Courses</div>
          </div>
          <div class="section-card-body">
            <div class="mentee-grid">
              ${(() => {
                const byCourse = {};
                students.forEach(s => { (byCourse[s.courseId] = byCourse[s.courseId] || []).push(s); });
                const ids = Object.keys(byCourse);
                if (!ids.length) return `<div class="w-full text-center py-8"><p style="color:var(--text-secondary)">No courses — you have no assigned students yet.</p></div>`;
                return ids.map(cid => {
                  const course = DB.Courses.getById(cid);
                  const cs = byCourse[cid];
                  const dept = course ? DB.Departments.getById(course.departmentId) : null;
                  return `<div class="section-card">
                    <div class="section-card-body">
                      <div style="display:flex;justify-content:space-between;align-items:start">
                        <div style="cursor:pointer" onclick="showClassStudents('${cid}')">
                          <div class="font-semibold">${course?.name || 'Course'}</div>
                          <div class="text-xs text-muted">${dept?.name || ''} · ${course?.semesterCount || 6} semesters</div>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="showCourseConfig('${cid}')" title="Course Settings">${Icons.settings}</button>
                      </div>
                      <hr class="divider">
                      <div class="flex gap-2">
                        <span class="badge badge-blue">${cs.length} students</span>
                        <button class="btn btn-secondary btn-sm" onclick="showClassStudents('${cid}')">View Students</button>
                      </div>
                    </div>
                  </div>`;
                }).join('');
              })()}
            </div>
          </div>
        </div>`;
    }

    function statCard(label, value, icon, gradient) {
      const valStr = String(value);
      const isNumber = /^[0-9]+(\.[0-9]+)?%?$/.test(valStr.trim());
      let valueHtml = valStr;
      if (isNumber) {
        const numPart = parseFloat(valStr);
        const suffix = valStr.includes('%') ? '%' : '';
        valueHtml = `<span class="count-up-value" data-target="${numPart}">${numPart}</span>${suffix}`;

        valueHtml = Str.escHtml(valStr);
      }
      return `<div class="stat-card hover-lift">
        <div class="stat-card-icon" style="background:${gradient};color:white">${icon}</div>
        <div class="stat-card-value">${valueHtml}</div>
        <div class="stat-card-label">${label}</div>

    function switchSubTab(tab) {
      activeSubTab = tab;
      const tabButtons = document.querySelectorAll('.tabs .tab-btn');
      let activeBtn = null;
      tabButtons.forEach(btn => {

          activeBtn = btn;
        } else {

        }

      if (activeBtn) {

  // Component columns come from the course config: N internals + other components
  function componentColumns() {
    const student = DB.Users.getById(selectedStudentId);
    const cfg = DB.CourseConfig.get(student?.courseId);
    const internals = Array.from({ length: cfg.numInternals || 1 }, (_, i) => `Internal ${i + 1}`);
    const others = (cfg.components || []).filter(c => !/^internal/i.test(c));
    return [...internals, ...others];
  }

  function subjectRowHTML(su = {}) {
    const cols = componentColumns();
    const marks = { ...(su.marks || {}) };
    if (su.internal != null && su.internal !== '' && marks['Internal 1'] == null) marks['Internal 1'] = su.internal;
    return `<tr>
      <td><input class="form-input" data-f="name" value="${su.name ? Str.escHtml(su.name) : ''}" placeholder="Subject"></td>
      <td><input class="form-input" type="number" data-f="attendance" value="${su.attendance ?? ''}" style="max-width:90px"></td>
      ${cols.map(c => `<td><input class="form-input" type="number" data-comp="${Str.escHtml(c)}" value="${marks[c] ?? ''}" style="max-width:90px"></td>`).join('')}
      <td><input class="form-input" type="number" data-f="external" value="${su.external ?? ''}" style="max-width:90px"></td>
      <td><input class="form-input" data-f="grade" value="${su.grade ? Str.escHtml(su.grade) : ''}" style="max-width:80px"></td>
      <td><button class="btn btn-ghost btn-sm btn-icon" onclick="this.closest('tr').remove()">${Icons.trash}</button></td>
    </tr>`;
  }
  function addSubjectRow() {
    document.getElementById('subjects-tbody').insertAdjacentHTML('beforeend', subjectRowHTML());
  }
  function saveSubjects() {
    const rows = [...document.querySelectorAll('#subjects-tbody tr')];
    const subjects = rows.map(tr => {
      const g = f => tr.querySelector(`[data-f="${f}"]`).value.trim();
      const marks = {};
      tr.querySelectorAll('[data-comp]').forEach(inp => { if (inp.value.trim() !== '') marks[inp.dataset.comp] = inp.value.trim(); });
      const internal = marks['Internal 1'] ?? ''; // keep flat value for read-only views
      return { name: g('name'), attendance: g('attendance'), marks, internal, external: g('external'), grade: g('grade') };
    }).filter(s => s.name);
    const rec = DB.SemesterRecords.get(selectedStudentId, currentRecordSemester) || {};
    DB.SemesterRecords.save(selectedStudentId, currentRecordSemester, { ...rec, subjects }, session.userId);
    Toast.success('Saved', 'Subject-wise report updated.');
  }

  function saveSemesterRecord(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());
    
    DB.SemesterRecords.save(selectedStudentId, currentRecordSemester, data, session.userId);
    
    // Check if at-risk (attendance alert)
    if (parseFloat(data.attendance) < 75) {
      const student = DB.Users.getById(selectedStudentId);
      DB.Notifications.create(session.userId, 'Low Attendance Alert', `${student.name}'s attendance fell to ${data.attendance}% in Sem ${currentRecordSemester}`, 'warning');
      updateNotifBadge();
    }

    Toast.success('Record Saved', `Semester ${currentRecordSemester} academic data updated.`);
  }

          <div class="form-group"><label class="form-label">At-Risk Attendance %</label><input type="number" class="form-input" id="cco-ratt" value="${rc.minAttendancePct}"></div>
          <div class="form-group"><label class="form-label">Attention Attendance %</label><input type="number" class="form-input" id="cco-attn" value="${rc.attentionAttendancePct}"></div>

          <div class="form-group"><label class="form-label">Max Internals Failed</label><input type="number" class="form-input" id="cco-fail" value="${rc.maxInternalsFailed}"></div>

      footer: `<button class="btn btn-secondary" onclick="Modal.close('course-cfg')">Cancel</button>
               <button class="btn btn-primary" onclick="saveCourseConfig('${courseId}')">Save</button>`,
    });
  }
  function saveCourseConfig(courseId) {
    const num = parseInt(document.getElementById('cco-int').value) || 1;
    const others = (document.getElementById('cco-comp').value || '').split(',').map(s=>s.trim()).filter(Boolean);
    const components = [...Array.from({length:num},(_,i)=>`Internal ${i+1}`), ...others];
    DB.CourseConfig.save(courseId, { numInternals: num, minAttendancePct: parseFloat(document.getElementById('cco-att').value), components }, session.userId);
    DB.RiskConfig.save({
      minAttendancePct: parseFloat(document.getElementById('cco-ratt').value),
      attentionAttendancePct: parseFloat(document.getElementById('cco-attn').value),
      minInternalMark: parseFloat(document.getElementById('cco-mark').value),
      maxInternalsFailed: parseInt(document.getElementById('cco-fail').value),
    }, session.userId);
    Toast.success('Saved', 'Course settings updated.');
    Modal.close('course-cfg');
  }

  // ── Course details & at-risk logic settings (Teacher & HOD) ──
  function showRiskConfig() {
    const rc = DB.RiskConfig.get();
    const myCourses = [...new Set(myStudents().map(s => s.courseId))].map(id => DB.Courses.getById(id)).filter(Boolean);
    Modal.create('risk-cfg', {
      title: 'At-Risk Logic & Course Details', size: 'md',
      body: `
        <p class="text-sm text-muted mb-4">Set the thresholds that flag a student as <strong>Need Attention</strong> or <strong>At Risk</strong>.</p>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Minimum Attendance %</label><input type="number" class="form-input" id="rc-att" value="${rc.minAttendancePct}"></div>
          <div class="form-group"><label class="form-label">Attention Attendance %</label><input type="number" class="form-input" id="rc-attn" value="${rc.attentionAttendancePct}"></div>
          <div class="form-group"><label class="form-label">Minimum Internal Mark</label><input type="number" class="form-input" id="rc-mark" value="${rc.minInternalMark}"></div>
          <div class="form-group"><label class="form-label">Max Internals Failed</label><input type="number" class="form-input" id="rc-fail" value="${rc.maxInternalsFailed}"></div>
        </div>
        <hr class="divider">
        <div class="form-label mb-2">Course Details (No. of internals, components)</div>
        ${myCourses.map(c => {
          const cfg = DB.CourseConfig.get(c.id);
          const otherComps = (cfg.components || []).filter(x => !/^internal/i.test(x));
          return `<div style="border:1px solid var(--border-color);border-radius:var(--border-radius-md);padding:var(--space-3);margin-bottom:var(--space-3)">
            <div class="font-semibold text-sm mb-2">${c.name}</div>
            <div class="form-grid" style="align-items:end">
              <div class="form-group"><label class="form-label">No. of Internals</label><input type="number" class="form-input" id="cc-int-${c.id}" value="${cfg.numInternals}" min="1" max="6"></div>
              <div class="form-group"><label class="form-label">Min Attendance %</label><input type="number" class="form-input" id="cc-att-${c.id}" value="${cfg.minAttendancePct}"></div>
              <div class="form-group"><label class="form-label">Other Components (comma-separated)</label><input type="text" class="form-input" id="cc-comp-${c.id}" value="${otherComps.join(', ')}" placeholder="Assignment, Seminar"></div>
            </div>
          </div>`;
        }).join('') || '<p class="text-xs text-muted">No classes assigned.</p>'}`,
      footer: `<button class="btn btn-secondary" onclick="Modal.close('risk-cfg')">Cancel</button><button class="btn btn-primary" onclick="saveRiskConfig()">Save</button>`,
    });
    window._rcCourseIds = myCourses.map(c => c.id);
  }
  function saveRiskConfig() {
    DB.RiskConfig.save({
      minAttendancePct: parseFloat(document.getElementById('rc-att').value),
      attentionAttendancePct: parseFloat(document.getElementById('rc-attn').value),
      minInternalMark: parseFloat(document.getElementById('rc-mark').value),
      maxInternalsFailed: parseInt(document.getElementById('rc-fail').value),
    }, session.userId);
    (window._rcCourseIds || []).forEach(id => {
      const num = parseInt(document.getElementById('cc-int-'+id).value) || 1;
      const others = (document.getElementById('cc-comp-'+id)?.value || '').split(',').map(s=>s.trim()).filter(Boolean);
      const components = [...Array.from({length:num},(_,i)=>`Internal ${i+1}`), ...others];
      DB.CourseConfig.save(id, { numInternals: num, minAttendancePct: parseFloat(document.getElementById('cc-att-'+id).value), components }, session.userId);
    });
    Toast.success('Saved', 'Risk logic and course details updated.');
    Modal.close('risk-cfg');
  }

  function deleteMeeting(id) {
    Modal.confirm({ title: 'Delete Log', message: 'Delete this meeting entry?', confirmText: 'Delete', onConfirm: () => {
      DB.Meetings.delete(id, session.userId);
      Toast.success('Deleted');
      renderSubTabContent();
    }});
  }

  // ── PTA Meetings ──────────────────────────────────────────────
  function showAddPtaModal() {
    const student = DB.Users.getById(selectedStudentId);
    const course = DB.Courses.getById(student.courseId);

    Modal.create('add-pta', {
      title: 'Log PTA / Parent Meeting',
      body: `
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label required">Semester</label>
            <select class="form-select" id="p-sem">
              ${Array.from({ length: course?.semesterCount || 6 }, (_, i) => `<option value="${i+1}">Semester ${i+1}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label required">Date</label><input type="date" class="form-input" id="p-date" value="${DateFmt.today()}"></div>
        </div>
        <div class="form-group"><label class="form-label required">Discussion Notes & Concerns</label><textarea class="form-textarea" id="p-notes" rows="4" placeholder="Enter notes discussed with parents..."></textarea></div>`,
      footer: `<button class="btn btn-secondary" onclick="Modal.close('add-pta')">Cancel</button>
               <button class="btn btn-primary" onclick="savePtaMeeting()">Log PTA Meeting</button>`,
    });
  }

  function savePtaMeeting() {
    const sem = parseInt(document.getElementById('p-sem').value);
    const date = document.getElementById('p-date').value;
    const notes = document.getElementById('p-notes').value.trim();

    if (!notes || !date) { Toast.error('Missing fields'); return; }

    DB.PTAMeetings.create({ studentId: selectedStudentId, semester: sem, date, notes, parentAcknowledged: false }, session.userId);
    
    // Notify parent if parent account exists
    const student = DB.Users.getById(selectedStudentId);
    if (student.parentEmail) {
      const parent = DB.Users.getAll().find(u => u.email === student.parentEmail);
      if (parent) {
        DB.Notifications.create(parent.id, 'PTA Meeting Acknowledgment Needed', `A PTA meeting was recorded on ${DateFmt.format(date)}. Please click to review and sign/acknowledge.`, 'warning');
      }
    }

    Toast.success('Logged', 'PTA meeting logged.');
    Modal.close('add-pta');
    renderSubTabContent();
  }

  function deletePtaMeeting(id) {
    Modal.confirm({ title: 'Delete Log', message: 'Delete this PTA meeting entry?', confirmText: 'Delete', onConfirm: () => {
      DB.PTAMeetings.delete(id, session.userId);
      Toast.success('Deleted');
      renderSubTabContent();
    }});
  }

  // ── Qualitative Eval Rating Helpers ───────────────────────────
  let traitRatings = { personality: {}, scholar: {} };

  function setRating(traitKey, score, btn) {
    const [type, key] = traitKey.split('-');
    traitRatings[type][key] = score;

    const parent = btn.closest('.rating-dots');
    parent.querySelectorAll('.rating-dot-btn').forEach((b, idx) => {
      b.classList.toggle('active', idx < score);
    });
  }

  function saveQualitative(e) {
    e.preventDefault();
    const participation = document.getElementById('qual-participation').value;
    const remarks = document.getElementById('qual-remarks').value;

    DB.MentoringNotes.save(selectedStudentId, currentRecordSemester, {
      params: { ...qualParamRatings },
      participation,
      remarks
    }, session.userId);

    Toast.success('Saved', 'Qualitative records updated.');
  }

  </script>
</body>
</html>
