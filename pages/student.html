<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — MentorFile</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .milestone-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--border-color);
    }
    .milestone-item:last-child { border-bottom: none; }
    .goal-header {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      color: white;
      padding: var(--space-6);
      border-radius: var(--border-radius-lg);
      margin-bottom: var(--space-6);
    }
    .profile-section-title {
      font-size: var(--font-size-base);
      font-weight: 700;
      color: var(--brand-primary);
      margin: var(--space-6) 0 var(--space-4);
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--border-color);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div id="sidebar-content"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <nav class="breadcrumb" id="breadcrumb">
            <span>Student Portal</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="current" id="breadcrumb-current">Dashboard</span>
          </nav>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="Theme.toggle()" title="Toggle theme"><span id="theme-icon-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span></button>
          <button class="header-btn" onclick="showNotifications()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="badge" id="notif-badge" style="display:none">0</span></button>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content" id="page-content">
        <div class="page-loader"><div class="loading-spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    let session;
    let activeSection = 'dashboard';
    let currentRecordSemester = 1;

    window.addEventListener('DOMContentLoaded', async () => {
      await DB.init();
      session = requireAuth(['student']);
      if (!session) return;

      buildStudentSidebar();
      updateThemeIcon();
      updateNotifBadge();
      navigateTo('dashboard');
    });

    function buildStudentSidebar() {
      const college = DB.Settings.getCollegeInfo();
      document.getElementById('sidebar-content').innerHTML = `
        <div class="sidebar-logo">
          <img src="../SB Logo.png" alt="St. Berchmans College" style="height:42px;object-fit:contain">
          <div class="sidebar-logo-text"><p>Student Portal</p></div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-label">Main</div>
            <button class="nav-item active" id="nav-dashboard" onclick="navigateTo('dashboard')">${Icons.home}<span class="nav-item-text">Dashboard</span></button>
            <button class="nav-item" id="nav-profile" onclick="navigateTo('profile')">${Icons.user}<span class="nav-item-text">Profile & Settings</span></button>
          </div>
          <div class="nav-section">
            <div class="nav-section-label">Academic Portfolio</div>
            <button class="nav-item" id="nav-academic" onclick="navigateTo('academic')">${Icons.chart}<span class="nav-item-text">Academic & Attendance</span></button>
            <button class="nav-item" id="nav-extra" onclick="navigateTo('extra')">${Icons.award}<span class="nav-item-text">Achievements</span></button>
          </div>
          <div class="nav-section">
            <div class="nav-section-label">Mentorship</div>
            <button class="nav-item" id="nav-meetings" onclick="navigateTo('meetings')">${Icons.calendar}<span class="nav-item-text">Meetings</span></button>
            <button class="nav-item" id="nav-goals" onclick="navigateTo('goals')">${Icons.target}<span class="nav-item-text">Goal Tracker</span></button>
            <button class="nav-item" id="nav-wellbeing" onclick="navigateTo('wellbeing')">${Icons.heart}<span class="nav-item-text">Wellbeing</span></button>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" onclick="showUserMenu()">
            ${renderAvatar(session.name, 'sm')}
            <div class="sidebar-user-info">
              <div class="name">${session.name}</div>
              <div class="role">${roleLabel(session.role)}</div>
            </div>
          </div>
          <button class="btn btn-danger btn-full btn-sm" style="margin-top:var(--space-3)" onclick="logout()">${Icons.logOut}<span style="margin-left:6px">Sign Out</span></button>
        </div>`;
    }

    function toggleSidebar() {
      const s = document.getElementById('sidebar');
      if (window.innerWidth <= 768) {
        s.classList.toggle('mobile-open');
        document.getElementById('mobile-overlay').classList.toggle('show');
      } else {
        s.classList.toggle('collapsed');
      }
    }

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('mobile-overlay').classList.remove('show');
    }

    function updateThemeIcon() {
      const isDark = Theme.get() === 'dark';
      document.getElementById('theme-icon-header').innerHTML = isDark ? Icons.sun : Icons.moon;
    }

    Theme._origToggle = Theme.toggle;
    Theme.toggle = () => { Theme._origToggle(); updateThemeIcon(); };

    function updateNotifBadge() {
      const count = DB.Notifications.getUnread(session.userId).length;
      const badge = document.getElementById('notif-badge');
      badge.style.display = count > 0 ? 'flex' : 'none';
      badge.textContent = count;
    }

    function showNotifications() {
      const notifs = DB.Notifications.getForUser(session.userId);
      DB.Notifications.markAllRead(session.userId);
      updateNotifBadge();
      Modal.create('notifs', {
        title: 'Notifications',
        body: notifs.length ? notifs.map(n => `
          <div style="padding:var(--space-3) 0;border-bottom:1px solid var(--border-color)">
            <div style="font-weight:600;font-size:var(--font-size-sm);color:var(--text-primary)">${n.title}</div>
            <div style="font-size:var(--font-size-xs);color:var(--text-secondary);margin-top:2px">${n.message}</div>
            <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${DateFmt.relativeTime(n.createdAt)}</div>
          </div>`).join('') : '<div class="empty-state"><p>No notifications.</p></div>',
        footer: `<button class="btn btn-secondary" onclick="Modal.close('notifs')">Close</button>`,
      });
    }

    // ── Router ──────────────────────────────────────────────────
    function navigateTo(section) {
      activeSection = section;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const navEl = document.getElementById(`nav-${section}`);
      if (navEl) navEl.classList.add('active');
      document.getElementById('breadcrumb-current').textContent = section.charAt(0).toUpperCase() + section.slice(1).replace(/([A-Z])/g, ' $1');
      closeMobileSidebar();

      const content = document.getElementById('page-content');
      const sections = { dashboard: renderDashboard, profile: renderProfile, academic: renderAcademic, extra: renderExtra, meetings: renderMeetings, goals: renderGoals, wellbeing: renderWellbeing };
      if (sections[section]) sections[section](content);
    }

    // ── Student Dashboard ────────────────────────────────────────
    function renderDashboard(container) {
      const profile = DB.Profiles.get(session.userId) || {};
      const course = DB.Courses.getById(session.courseId);
      const mentorId = DB.Assignments.getMentor(session.userId);
      const mentor = mentorId ? DB.Users.getById(mentorId) : null;
      const recs = DB.SemesterRecords.getAll(session.userId);
      const latest = recs[recs.length - 1] || {};
      const status = DB.Analytics.getStudentStatus(session.userId);
      
      const unconfirmedMeetings = DB.Meetings.getAll(session.userId).filter(m => !m.studentConfirmed);

      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">Welcome, ${session.name}</h1>
          <p class="page-subtitle">Track your mentorship logs, courses, and PTA meetings.</p>
        </div>

        <div class="stats-grid">
          ${statCard('Latest SGPA', latest.gradePoint || 'No Data', Icons.chart, 'linear-gradient(135deg, #4F46E5, #6366F1)')}
          ${statCard('Attendance', latest.attendance ? latest.attendance + '%' : 'No Data', Icons.users, 'linear-gradient(135deg, #0891B2, #06B6D4)')}
          ${statCard('My Status', renderStatusBadge(status), Icons.check_circle, 'linear-gradient(135deg, #059669, #10B981)')}
          ${statCard('Assigned Mentor', mentor ? mentor.name : 'Not Assigned', Icons.user, 'linear-gradient(135deg, #7C3AED, #9F67FF)')}
        </div>

        ${unconfirmedMeetings.length ? `
          <div class="alert alert-warning mb-6">
            ${Icons.alert}
            <div style="flex:1">
              <strong>Meeting Confirmation Needed:</strong> You have ${unconfirmedMeetings.length} meeting(s) awaiting your confirmation. 
              <button class="btn btn-secondary btn-sm" style="margin-left:var(--space-4)" onclick="navigateTo('meetings')">Confirm Now</button>
            </div>
          </div>` : ''}

        <div class="grid" style="grid-template-columns:2fr 1fr;gap:var(--space-6)">
          <div class="section-card">
            <div class="section-card-header"><div class="section-card-title">${Icons.chart} Semester-wise Performance Chart</div></div>
            <div class="section-card-body" style="padding:0">
              <table class="data-table">
                <thead><tr><th>Semester</th><th>SGPA</th><th>Grade</th><th>Attendance</th></tr></thead>
                <tbody>
                  ${Array.from({ length: course?.semesterCount || 6 }, (_, i) => {
                    const r = recs.find(rc => rc.semester === i + 1);
                    return `
                      <tr>
                        <td>Semester ${i + 1}</td>
                        <td>${r?.gradePoint || '—'}</td>
                        <td>${r?.grade || '—'}</td>
                        <td>${r?.attendance ? r.attendance + '%' : '—'}</td>
                      </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <div class="section-card">
            <div class="section-card-header"><div class="section-card-title">${Icons.target} Active Goal</div></div>
            <div class="section-card-body">
              <div class="goal-header" style="margin-bottom:0">
                <div style="font-size:var(--font-size-xs);text-transform:uppercase;opacity:0.8">Life Goal / Ambition</div>
                <div style="font-size:var(--font-size-lg);font-weight:700;margin-top:2px">${profile.lifeGoal || 'Set a life goal in your profile.'}</div>
              </div>
              <button class="btn btn-secondary btn-full btn-sm mt-4" onclick="navigateTo('goals')">Open Goal Tracker</button>
            </div>
          </div>
        </div>`;
    }

    function statCard(label, value, icon, gradient) {
      const isHtml = String(value).includes('<span');
      return `<div class="stat-card">
        <div class="stat-card-icon" style="background:${gradient};color:white">${icon}</div>
        <div class="stat-card-value">${value}</div>
        <div class="stat-card-label">${label}</div>
      </div>`;
    }

    // ── My Profile Form ──────────────────────────────────────────
    function renderProfile(container) {
      const profile = DB.Profiles.get(session.userId) || {};
      container.innerHTML = `
        <div class="section-card mb-6">
          <div class="section-card-header"><div class="section-card-title">${Icons.key} Account & Password</div>
            <button class="btn btn-secondary btn-sm" onclick="showChangePassword()">Change Password</button>
          </div>
          <div class="section-card-body">
            <div class="text-sm text-muted">Email: <strong>${session.email}</strong> · Use "Change Password" to update your password anytime.</div>
          </div>
        </div>
        <div class="section-card">
          <div class="section-card-header"><div class="section-card-title">${Icons.user} Update My Information</div></div>
          <div class="section-card-body">
            <form onsubmit="saveProfile(event)">
              <div class="profile-section-title" style="margin-top:0">A. Personal & Identification Info</div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label required">Roll No.</label><input type="text" name="rollNo" class="form-input" value="${profile.rollNo || ''}" required></div>
                <div class="form-group"><label class="form-label">Class</label><input type="text" name="className" class="form-input" value="${profile.className || ''}"></div>
                <div class="form-group"><label class="form-label">Blood Group</label><input type="text" name="bloodGroup" class="form-input" value="${profile.bloodGroup || ''}"></div>
              </div>

              <div class="form-grid">
                <div class="form-group"><label class="form-label">Religion</label><input type="text" name="religion" class="form-input" value="${profile.religion || ''}"></div>
                <div class="form-group"><label class="form-label">Community</label><input type="text" name="community" class="form-input" value="${profile.community || ''}"></div>
                <div class="form-group">
                  <label class="form-label">Residence</label>
                  <select name="residenceType" class="form-select" onchange="toggleHostelFields(this.value)">
                    <option value="day_scholar" ${profile.residenceType==='day_scholar'?'selected':''}>Day Scholar</option>
                    <option value="hosteler" ${profile.residenceType==='hosteler'?'selected':''}>Hosteler</option>
                  </select>
                </div>
              </div>

              <div id="hostel-fields-wrap" style="display:${profile.residenceType==='hosteler'?'block':'none'}">
                <div class="form-grid">
                  <div class="form-group"><label class="form-label">Hostel Name</label><input type="text" name="hostelName" class="form-input" value="${profile.hostelName || ''}"></div>
                  <div class="form-group"><label class="form-label">Warden Name</label><input type="text" name="wardenName" class="form-input" value="${profile.wardenName || ''}"></div>
                  <div class="form-group"><label class="form-label">Warden Phone</label><input type="tel" name="wardenPhone" class="form-input" value="${profile.wardenPhone || ''}"></div>
                </div>
              </div>

              <div class="profile-section-title">B. Contact Details</div>
              <div class="grid-2">
                <div class="form-group"><label class="form-label">Permanent Address</label><textarea name="permanentAddress" class="form-textarea">${profile.permanentAddress || ''}</textarea></div>
                <div class="form-group"><label class="form-label">Communication Address</label><textarea name="communicationAddress" class="form-textarea">${profile.communicationAddress || ''}</textarea></div>
              </div>

              <div class="profile-section-title">C. Family Background</div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Father's Name</label><input type="text" name="fatherName" class="form-input" value="${profile.fatherName || ''}"></div>
                <div class="form-group"><label class="form-label">Father's Phone</label><input type="tel" name="fatherPhone" class="form-input" value="${profile.fatherPhone || ''}"></div>
                <div class="form-group"><label class="form-label">Mother's Name</label><input type="text" name="motherName" class="form-input" value="${profile.motherName || ''}"></div>
              </div>

              <div class="profile-section-title">D. Entry Qualifications & Ambition</div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label">SSLC School</label><input type="text" name="sslcSchool" class="form-input" value="${profile.sslcSchool || ''}"></div>
                <div class="form-group"><label class="form-label">SSLC %</label><input type="text" name="sslcPercentage" class="form-input" value="${profile.sslcPercentage || ''}"></div>
                <div class="form-group"><label class="form-label">SSLC Grade</label><input type="text" name="sslcGrade" class="form-input" value="${profile.sslcGrade || ''}"></div>
              </div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Plus Two (+2) School</label><input type="text" name="plusTwoSchool" class="form-input" value="${profile.plusTwoSchool || ''}"></div>
                <div class="form-group"><label class="form-label">Plus Two %</label><input type="text" name="plusTwoPercentage" class="form-input" value="${profile.plusTwoPercentage || ''}"></div>
                <div class="form-group"><label class="form-label">Plus Two Grade</label><input type="text" name="plusTwoGrade" class="form-input" value="${profile.plusTwoGrade || ''}"></div>
              </div>
              <div class="form-group"><label class="form-label">Prior Co-curricular Accomplishments</label><textarea name="priorAchievements" class="form-textarea">${profile.priorAchievements || ''}</textarea></div>

              <div class="form-group"><label class="form-label">Hobbies & Special Talents</label><input type="text" name="hobbies" class="form-input" value="${profile.hobbies || ''}"></div>
              <div class="form-group"><label class="form-label">Life Goal / Ambition</label><input type="text" name="lifeGoal" class="form-input" value="${profile.lifeGoal || ''}"></div>

              <button type="submit" class="btn btn-primary mt-6">Save My Profile Info</button>
            </form>
          </div>
        </div>`;
    }

    function toggleHostelFields(val) {
      document.getElementById('hostel-fields-wrap').style.display = val === 'hosteler' ? 'block' : 'none';
    }

    function saveProfile(e) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = Object.fromEntries(fd.entries());
      DB.Profiles.save(session.userId, data, session.userId);
      Toast.success('Saved', 'Your profile details have been saved.');
    }

    // ── Academic & Attendance Page ──────────────────────────────
    function renderAcademic(container) {
      const course = DB.Courses.getById(session.courseId);
      const recs = DB.SemesterRecords.getAll(session.userId);
      const ov = StudentReport.overview(session.userId);
      container.innerHTML = `
        <div class="page-header"><h1 class="page-title">Academic & Attendance</h1><p class="page-subtitle">Overview and semester-by-semester performance.</p></div>

        <div class="stats-grid">
          ${statCard('Semesters', ov.total, Icons.book, 'linear-gradient(135deg, #4F46E5, #6366F1)')}
          ${statCard('Passed', ov.passed, Icons.check_circle, 'linear-gradient(135deg, #059669, #10B981)')}
          ${statCard('Failed', ov.failed, Icons.alert, 'linear-gradient(135deg, #DC2626, #EF4444)')}
          ${statCard('Latest Attendance', (recs[recs.length-1]?.attendance ?? '—') + (recs[recs.length-1]?.attendance!=null?'%':''), Icons.users, 'linear-gradient(135deg, #0891B2, #06B6D4)')}
        </div>

        <div class="section-card mb-6">
          <div class="section-card-header"><div class="section-card-title">${Icons.chart} Semester-wise Performance</div></div>
          <div class="section-card-body" style="padding:0"><table class="data-table">
            <thead><tr><th>Semester</th><th>SGPA</th><th>Grade</th><th>Attendance</th><th>Result</th></tr></thead>
            <tbody>${Array.from({ length: course?.semesterCount || 6 }, (_, i) => {
              const r = recs.find(rc => rc.semester === i + 1) || {};
              const gp = parseFloat(r.gradePoint);
              const result = isNaN(gp) ? '—' : (gp >= 5 && (r.grade||'').toUpperCase() !== 'F' ? '<span class="badge badge-green">Pass</span>' : '<span class="badge badge-red">Fail</span>');
              return `<tr><td>Semester ${i+1}</td><td>${r.gradePoint||'—'}</td><td>${r.grade||'—'}</td><td>${r.attendance?r.attendance+'%':'—'}</td><td>${result}</td></tr>`;
            }).join('')}</tbody>
          </table></div>
        </div>

        <div class="semester-tabs">
          ${Array.from({ length: course?.semesterCount || 6 }, (_, i) => `
            <button class="semester-tab-btn ${currentRecordSemester === i+1 ? 'active' : ''}" onclick="switchRecordSemester(${i+1})">Semester ${i+1}</button>`).join('')}
        </div>
        <div id="semester-detail-card"></div>`;
      renderSemesterDetail();
    }

    function switchRecordSemester(sem) {
      currentRecordSemester = sem;
      renderSemesterDetail();
    }

    function renderSemesterDetail() {
      const detailContainer = document.getElementById('semester-detail-card');
      const record = DB.SemesterRecords.get(session.userId, currentRecordSemester) || { gradePoint: '', grade: '', remarks: '', attendance: '' };
      const extraCredit = DB.ExtraCredit.getBySemester(session.userId, currentRecordSemester);

      detailContainer.innerHTML = `
        <div class="section-card mb-6">
          <div class="section-card-header"><div class="section-card-title">Performance Record — Semester ${currentRecordSemester}</div></div>
          <div class="section-card-body">
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Semester SGPA / Grade Point</label><div class="form-input" style="background:var(--bg-surface-2)">${record.gradePoint || '—'}</div></div>
              <div class="form-group"><label class="form-label">Letter Grade</label><div class="form-input" style="background:var(--bg-surface-2)">${record.grade || '—'}</div></div>
              <div class="form-group"><label class="form-label">Attendance Percentage (%)</label><div class="form-input" style="background:var(--bg-surface-2)">${record.attendance ? record.attendance + '%' : '—'}</div></div>
            </div>
            <div class="form-group"><label class="form-label">Mentor Remarks</label><div class="form-textarea" style="background:var(--bg-surface-2);min-height:unset;padding:var(--space-3)">${record.remarks || 'No remarks added.'}</div></div>
          </div>
        </div>

        <div class="section-card mb-6">
          <div class="section-card-header"><div class="section-card-title">${Icons.fileText} Subject-wise Details — Semester ${currentRecordSemester}</div></div>
          <div class="section-card-body" style="padding:0"><div class="table-wrapper"><table class="data-table">
            ${(() => {
              const cfg = DB.CourseConfig.get(session.courseId);
              const cols = [...Array.from({length: cfg.numInternals||1}, (_,i)=>`Internal ${i+1}`), ...((cfg.components||[]).filter(c=>!/^internal/i.test(c)))];
              const head = `<thead><tr><th>Subject</th><th>Attendance %</th>${cols.map(c=>`<th>${c}</th>`).join('')}<th>External</th><th>Grade</th></tr></thead>`;
              const body = `<tbody>${(record.subjects || []).map(su => {
                const marks = su.marks || (su.internal!=null ? {'Internal 1': su.internal} : {});
                return `<tr><td>${su.name||'—'}</td><td>${su.attendance ?? '—'}</td>${cols.map(c=>`<td>${marks[c] ?? '—'}</td>`).join('')}<td>${su.external ?? '—'}</td><td>${su.grade||'—'}</td></tr>`;
              }).join('') || `<tr><td colspan="${cols.length+4}" style="text-align:center;color:var(--text-tertiary)">No subject-wise details added for this semester yet.</td></tr>`}</tbody>`;
              return head + body;
            })()}
          </table></div></div>
        </div>

        <div class="section-card">
          <div class="section-card-header"><div class="section-card-title">${Icons.award} Extra Credit Activities — Semester ${currentRecordSemester}</div></div>
          <div class="section-card-body">
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>Category</th><th>Course Name</th><th>Provider</th><th>Completion Date</th></tr></thead>
                <tbody>
                  ${extraCredit.map(ec => `
                    <tr>
                      <td><span class="badge badge-purple">${ec.category}</span></td>
                      <td><strong>${ec.courseName}</strong></td>
                      <td>${ec.provider || '—'}</td>
                      <td>${DateFmt.format(ec.completionDate)}</td>
                    </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary)">No extra credit activities for this semester.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    }

    // ── Co-Curricular Extra Page ─────────────────────────────────
    function renderExtra(container) {
      const achievements = DB.Achievements.getAll(session.userId);
      container.innerHTML = `
        <div class="section-card">
          <div class="section-card-header"><div class="section-card-title">${Icons.award} Awards & Recognized Achievements</div></div>
          <div class="section-card-body">
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>Sem</th><th>Date</th><th>Achievement Detail</th><th>Category</th></tr></thead>
                <tbody>
                  ${achievements.map(aw => `
                    <tr>
                      <td>Semester ${aw.semester}</td>
                      <td>${DateFmt.format(aw.date)}</td>
                      <td><strong>${aw.title}</strong></td>
                      <td><span class="badge badge-cyan">${aw.category}</span></td>
                    </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary);padding:var(--space-8)">No achievements added to folder yet.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    }

    // ── Meetings & Confirmation Page ──────────────────────────────
    function renderMeetings(container) {
      const meetings = DB.Meetings.getAll(session.userId).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
      container.innerHTML = `
        <div class="section-card">
          <div class="section-card-header"><div class="section-card-title">${Icons.calendar} My Meetings</div>
            <button class="btn btn-primary btn-sm" onclick="requestMeetingModal()">${Icons.plus} Request Meeting</button>
          </div>
          <div class="section-card-body">
            <p class="text-xs text-muted mb-4">Your meeting reports. Confidential staff comments are never shown here.</p>
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>Semester</th><th>Date</th><th>Discussion</th><th>Goals</th><th>Confirmation</th></tr></thead>
                <tbody>
                  ${meetings.map(m => `
                    <tr>
                      <td>Sem ${m.semester}</td>
                      <td>${DateFmt.format(m.date)}</td>
                      <td style="white-space:normal;max-width:260px">${Str.escHtml(m.notes || m.discussion || '')}</td>
                      <td style="white-space:normal;max-width:200px">${Str.escHtml(m.goals || '—')}</td>
                      <td>
                        ${m.studentConfirmed
                          ? `<span class="badge badge-green">${Icons.check} Attended & Confirmed</span>`
                          : `<button class="btn btn-primary btn-sm" onclick="confirmMeeting('${m.id}')">Acknowledge Attendance</button>`}
                      </td>
                    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-tertiary);padding:var(--space-8)">No meetings found.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    }

    function confirmMeeting(meetingId) {
      DB.Meetings.confirm(meetingId, session.userId);
      Toast.success('Meeting Confirmed', 'You have confirmed your attendance for this meeting.');
      renderMeetings(document.getElementById('page-content'));
    }

    function requestMeetingModal() {
      const course = DB.Courses.getById(session.courseId);
      Modal.create('req-meet', {
        title: 'Request a Meeting',
        body: `
          <div class="form-grid">
            <div class="form-group"><label class="form-label required">Semester</label>
              <select class="form-select" id="rm-sem">${Array.from({ length: course?.semesterCount || 6 }, (_, i) => `<option value="${i+1}">Semester ${i+1}</option>`).join('')}</select></div>
            <div class="form-group"><label class="form-label required">Preferred Date</label><input type="date" class="form-input" id="rm-date" value="${DateFmt.today()}"></div>
          </div>
          <div class="form-group"><label class="form-label">Reason / what you'd like to discuss</label><textarea class="form-textarea" id="rm-notes" rows="2"></textarea></div>
          <div class="form-group"><label class="form-label">My Discussion Points (private to me)</label><textarea class="form-textarea" id="rm-points" rows="2" placeholder="Only you can see these"></textarea>
            <div class="form-hint">Private to you. Your teacher cannot see these points.</div></div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('req-meet')">Cancel</button>
                 <button class="btn btn-primary" onclick="submitMeetingRequest()">Send Request</button>`,
      });
    }
    function submitMeetingRequest() {
      const sem = parseInt(document.getElementById('rm-sem').value);
      const date = document.getElementById('rm-date').value;
      const notes = document.getElementById('rm-notes').value.trim();
      const discussionPointsStudent = document.getElementById('rm-points').value.trim();
      if (!date) { Toast.error('Pick a date'); return; }
      const mentorId = DB.Assignments.getMentor(session.userId);
      DB.Meetings.create({ mentorId, studentId: session.userId, semester: sem, date, notes, discussionPointsStudent, requestedBy: 'student', status: 'requested', studentConfirmed: true }, session.userId);
      if (mentorId) DB.Notifications.create(mentorId, 'Meeting Requested by Student', `${session.name} requested a meeting on ${DateFmt.format(date)}. ${notes}`, 'info');
      Toast.success('Requested', 'Your teacher has been notified.');
      Modal.close('req-meet');
      renderMeetings(document.getElementById('page-content'));
    }

    // ── Goal Tracker ─────────────────────────────────────────────
    function renderGoals(container) {
      const profile = DB.Profiles.get(session.userId) || {};
      const goalsList = DB.getArr('sb_goals_' + session.userId);

      container.innerHTML = `
        <div class="goal-header">
          <div style="font-size:var(--font-size-xs);text-transform:uppercase;opacity:0.8">Active Career Target</div>
          <div style="font-size:var(--font-size-2xl);font-weight:800;margin-top:4px">${profile.lifeGoal || 'No Life Goal set. Add one in "My Profile" tab.'}</div>
        </div>

        ${(() => {
          const mtgGoals = DB.Meetings.getAll(session.userId).filter(m => m.goals && m.goals.trim()).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          if (!mtgGoals.length) return '';
          return `<div class="section-card mb-6">
            <div class="section-card-header"><div class="section-card-title">${Icons.target} Goals Set by Mentor</div></div>
            <div class="section-card-body" style="padding:0">
              ${mtgGoals.map(m => `<div style="display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border-color)">
                <span class="text-xs text-muted" style="min-width:92px">${DateFmt.format(m.date)}</span>
                <span class="text-sm" style="flex:1">${m.goals}</span>
                ${m.goalDone
                  ? `<span class="badge badge-green">${Icons.check} Completed</span>`
                  : m.goalStudentDone
                    ? `<span class="badge badge-yellow">Awaiting Mentor Review</span>`
                    : `<button class="btn btn-secondary btn-sm" onclick="markGoalCompleted('${m.id}')">Mark as Completed</button>`}
              </div>`).join('')}
            </div>
          </div>`;
        })()}

        <div class="section-card">
          <div class="section-card-header">
            <div class="section-card-title">${Icons.target} My Action Plan & Milestones</div>
            <button class="btn btn-primary btn-sm" onclick="showAddGoalModal()">${Icons.plus} Add Goal Milestone</button>
          </div>
          <div class="section-card-body">
            <div id="milestones-wrap">
              ${goalsList.map(g => `
                <div class="milestone-item">
                  <input type="checkbox" ${g.completed ? 'checked' : ''} onchange="toggleGoal('${g.id}', this.checked)" style="width:18px;height:18px;cursor:pointer">
                  <div style="flex:1;min-width:0;text-decoration:${g.completed?'line-through':'none'};color:${g.completed?'var(--text-tertiary)':'var(--text-primary)'}">
                    <div class="font-semibold text-sm">${g.title}</div>
                    <div class="text-xs text-muted">Target: Sem ${g.semester} · ${DateFmt.format(g.targetDate)}</div>
                  </div>
                  <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteGoal('${g.id}')">${Icons.trash}</button>
                </div>`).join('') || '<div style="text-align:center;padding:var(--space-6);color:var(--text-tertiary)">No goals added. Define semester objectives.</div>'}
            </div>
          </div>
        </div>`;
    }

    // Student requests goal completion — closes only after the mentor reviews & approves
    function markGoalCompleted(meetingId) {
      DB.Meetings.update(meetingId, { goalStudentDone: true }, session.userId);
      const mentorId = DB.Assignments.getMentor(session.userId);
      if (mentorId) DB.Notifications.create(mentorId, 'Goal Marked Complete by Student', `${session.name} marked a mentor goal as completed. Please review and approve.`, 'info');
      Toast.success('Sent for review', 'Your mentor will review and confirm completion.');
      navigateTo('goals');
    }

    function showAddGoalModal() {
      const course = DB.Courses.getById(session.courseId);
      Modal.create('add-goal', {
        title: 'Add Goal Milestone',
        body: `
          <div class="form-group"><label class="form-label required">Milestone Objective</label><input type="text" class="form-input" id="g-title" placeholder="e.g. Complete Python basics"></div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label required">Target Semester</label>
              <select class="form-select" id="g-sem">
                ${Array.from({ length: course?.semesterCount || 6 }, (_, i) => `<option value="${i+1}">Semester ${i+1}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label class="form-label required">Target Date</label><input type="date" class="form-input" id="g-date" value="${DateFmt.today()}"></div>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('add-goal')">Cancel</button>
                 <button class="btn btn-primary" onclick="saveGoal()">Save Milestone</button>`,
      });
    }

    function saveGoal() {
      const title = document.getElementById('g-title').value.trim();
      const sem = parseInt(document.getElementById('g-sem').value);
      const date = document.getElementById('g-date').value;

      if (!title || !date) { Toast.error('Missing fields'); return; }

      const list = DB.getArr('sb_goals_' + session.userId);
      list.push({ id: DB.generateId(), title, semester: sem, targetDate: date, completed: false });
      DB.setArr('sb_goals_' + session.userId, list);

      Toast.success('Saved', 'Goal Milestone created.');
      Modal.close('add-goal');
      navigateTo('goals');
    }

    function toggleGoal(id, completed) {
      const list = DB.getArr('sb_goals_' + session.userId);
      const idx = list.findIndex(g => g.id === id);
      if (idx !== -1) {
        list[idx].completed = completed;
        DB.setArr('sb_goals_' + session.userId, list);
        Toast.success('Goal Updated');
        navigateTo('goals');
      }
    }

    function deleteGoal(id) {
      const list = DB.getArr('sb_goals_' + session.userId).filter(g => g.id !== id);
      DB.setArr('sb_goals_' + session.userId, list);
      Toast.success('Goal Deleted');
      navigateTo('goals');
    }

    // ── Wellbeing Survey ─────────────────────────────────────────
    function renderWellbeing(container) {
      const checks = DB.getArr('sb_wellbeing_' + session.userId);
      container.innerHTML = `
        <div class="section-card">
          <div class="section-card-header"><div class="section-card-title">${Icons.heart} Wellbeing Check-in</div></div>
          <div class="section-card-body">
            <p class="text-sm text-muted mb-6">Brief pulse survey to share stress signals or counseling requests with your mentor confidentially.</p>
            
            <form onsubmit="submitWellbeing(event)">
              <div class="form-group">
                <label class="form-label required">Current Mood / Stress Level</label>
                <select name="mood" class="form-select" required>
                  <option value="good">Good / On Track</option>
                  <option value="manageable">Manageable Stress</option>
                  <option value="high">High Stress / Overwhelmed</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Brief status update or personal concern (Optional)</label>
                <textarea name="concern" class="form-textarea" rows="3" placeholder="Share anything you'd like your mentor to know..."></textarea>
              </div>

              <div class="form-group">
                <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer">
                  <input type="checkbox" name="counseling" value="yes"> Request immediate personal/academic guidance session
                </label>
              </div>

              <button type="submit" class="btn btn-primary">Submit Check-In</button>
            </form>
          </div>
        </div>

        <div class="section-card mt-6">
          <div class="section-card-header"><div class="section-card-title">Past Surveys</div></div>
          <div class="section-card-body" style="padding:0">
            <table class="data-table">
              <thead><tr><th>Date</th><th>Mood Status</th><th>Notes</th><th>Counseling Requested</th></tr></thead>
              <tbody>
                ${checks.map(c => `
                  <tr>
                    <td>${DateFmt.format(c.date, 'time')}</td>
                    <td><span class="badge ${c.mood==='good'?'badge-green':(c.mood==='high'?'badge-red':'badge-yellow')}">${c.mood}</span></td>
                    <td class="text-sm">${c.concern || '—'}</td>
                    <td>${c.counseling ? '✓ Yes' : 'No'}</td>
                  </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-tertiary);padding:var(--space-6)">No logs recorded yet.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    function submitWellbeing(e) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = Object.fromEntries(fd.entries());
      const checks = DB.getArr('sb_wellbeing_' + session.userId);
      
      checks.push({
        id: DB.generateId(),
        date: new Date().toISOString(),
        mood: data.mood,
        concern: data.concern || '',
        counseling: !!data.counseling
      });
      DB.setArr('sb_wellbeing_' + session.userId, checks);

      // Alert mentor
      const mentorId = DB.Assignments.getMentor(session.userId);
      if (mentorId) {
        if (data.mood === 'high' || data.counseling) {
          DB.Notifications.create(mentorId, 'Student Wellbeing Concern', `${session.name} reported high stress or requested a guidance session.`, 'warning');
        }
      }

      Toast.success('Check-in Saved', 'Shared with your mentor.');
      renderWellbeing(document.getElementById('page-content'));
    }
  </script>
</body>
</html>
