<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://wzqraqooarfoxkinuyic.supabase.co; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://wzqraqooarfoxkinuyic.supabase.co; connect-src 'self' https://wzqraqooarfoxkinuyic.supabase.co;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../SB Logo.png">
  <title>HOD / Principal — MentorFile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/motion.css">
  <style>
    .analytics-row { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-6); margin-bottom: var(--space-8); }
    .back-btn { margin-bottom: var(--space-5); }
    .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-5); }
    .class-card { cursor: pointer; transition: transform var(--transition-fast), box-shadow var(--transition-fast); }
    .class-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    @media (max-width: 1024px) { .analytics-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileSidebar()"></div>
    <aside class="sidebar" id="sidebar"><div id="sidebar-content"></div></aside>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <nav class="breadcrumb" id="breadcrumb">
            <span id="breadcrumb-root">HOD</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="current" id="breadcrumb-current">Dashboard</span>
          </nav>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="Theme.toggle()" title="Toggle theme"><span id="theme-icon-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span></button>
          <button class="header-btn" onclick="showNotifications()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="badge" id="notif-badge" style="display:none">0</span></button>
        </div>
      </header>
      <div class="page-content" id="page-content">
        <div class="page-loader">
          <div style="width:100%;max-width:1200px;padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-6);">
            <div style="height:32px;width:240px;" class="skeleton-shimmer"></div>
            <div style="height:20px;width:360px;margin-bottom:var(--space-4);" class="skeleton-shimmer"></div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:var(--space-4);">
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
              <div style="height:100px;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
            </div>
            <div style="height:300px;width:100%;border-radius:var(--border-radius-lg);" class="skeleton-shimmer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js" integrity="sha512-omCJ8S/xl+DUjxNTqvhVSptHwIEi0IDp52n63HEj8ThJgSK/8Lcpi9btnTdE8db+Y4cDKZrZ7NQZBX4PKN4i4g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="../js/motion.js"></script>
  <script>
    let session;
    let isPrincipal = false;
    let activeTab = 'dashboard';
    let selectedStudentId = null;
    let selectedClassId = null;

    window.addEventListener('DOMContentLoaded', async () => {
      await DB.init();
      session = requireAuth(['hod', 'principal']);
      if (!session) return;
      isPrincipal = session.role === 'principal';
      document.getElementById('breadcrumb-root').textContent = roleLabel(session.role);
      buildSidebarUI();
      updateThemeIcon();
      updateNotifBadge();
      navigate('dashboard');
    });

    // ── Scope helpers (HOD = own dept, Principal = whole college) ──
    function scopedStudents() {
      return DB.Users.getAll().filter(u => u.role === 'student' && (isPrincipal || u.departmentId === session.departmentId));
    }
    function scopedFaculty() {
      return DB.Users.getAll().filter(u => u.role === 'mentor' && (isPrincipal || u.departmentId === session.departmentId));
    }
    function scopedCourses() {
      return DB.Courses.getAll().filter(c => isPrincipal || c.departmentId === session.departmentId);
    }
    function scopedDepartments() {
      return DB.Departments.getAll().filter(d => isPrincipal || d.id === session.departmentId);
    }

    // ── Sidebar ─────────────────────────────────────────────────
    function buildSidebarUI() {
      const college = DB.Settings.getCollegeInfo();
      document.getElementById('sidebar-content').innerHTML = `
        <div class="sidebar-logo">
          <img src="../SB Logo.png" alt="St. Berchmans College" style="height:42px;object-fit:contain">
          <div class="sidebar-logo-text"><p>${roleLabel(session.role)} Panel</p></div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <div class="nav-section-label">Overview</div>
            <button class="nav-item" id="nav-dashboard" onclick="navigate('dashboard')">${Icons.home}<span class="nav-item-text">Dashboard</span></button>
            <button class="nav-item" id="nav-classes" onclick="navigate('classes')">${Icons.grid}<span class="nav-item-text">Classes</span></button>
            <button class="nav-item" id="nav-students" onclick="navigate('students')">${Icons.users}<span class="nav-item-text">Students</span></button>
          </div>
          <div class="nav-section">
            <div class="nav-section-label">Mentorship</div>
            <button class="nav-item" id="nav-mentorship" onclick="window.location.href='mentor.html'">${Icons.user}<span class="nav-item-text">My Mentees</span></button>
          </div>
          <div class="nav-section">
            <div class="nav-section-label">System</div>
            <button class="nav-item" id="nav-settings" onclick="showProfileSettings()">${Icons.settings}<span class="nav-item-text">Profile & Settings</span></button>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user" onclick="showUserMenu()">
            ${renderAvatar(session.name, 'sm')}
            <div class="sidebar-user-info">
              <div class="name">${session.name}</div>
              <div class="role">${roleLabel(session.role)}</div>
            </div>
          </div>
          <button class="btn btn-danger btn-full btn-sm" style="margin-top:var(--space-3)" onclick="logout()">${Icons.logOut}<span style="margin-left:6px">Sign Out</span></button>
        </div>`;
    }

    function toggleSidebar() {
      const s = document.getElementById('sidebar');
      if (window.innerWidth <= 768) { s.classList.toggle('mobile-open'); document.getElementById('mobile-overlay').classList.toggle('show'); }
      else { s.classList.toggle('collapsed'); }
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('mobile-overlay').classList.remove('show');
    }
    function updateThemeIcon() { document.getElementById('theme-icon-header').innerHTML = Icons.bulb; }
    Theme._origToggle = Theme.toggle;
    Theme.toggle = () => { Theme._origToggle(); updateThemeIcon(); };
    function updateNotifBadge() {
      const count = DB.Notifications.getUnread(session.userId).length;
      const badge = document.getElementById('notif-badge');
      badge.style.display = count > 0 ? 'flex' : 'none';
      badge.textContent = count;
    }
    function showNotifications() {
      const notifs = DB.Notifications.getForUser(session.userId);
      DB.Notifications.markAllRead(session.userId);
      updateNotifBadge();
      Modal.create('notifs', {
        title: 'Notifications',
        body: notifs.length ? notifs.map(n => `
          <div style="padding:var(--space-3) 0;border-bottom:1px solid var(--border-color)">
            <div style="font-weight:600;font-size:var(--font-size-sm)">${n.title}</div>
            <div style="font-size:var(--font-size-xs);color:var(--text-secondary);margin-top:2px">${n.message}</div>
            <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${DateFmt.relativeTime(n.createdAt)}</div>
          </div>`).join('') : '<div class="empty-state"><p>No notifications.</p></div>',
        footer: `<button class="btn btn-secondary" onclick="Modal.close('notifs')">Close</button>`,
      });
    }
    function showProfileSettings() { showUserMenu(); }

    // ── Navigation ───────────────────────────────────────────────
    function navigate(tab) {
      const navEl = document.getElementById(`nav-${tab}`);
      if (navEl) Motion.glidePill(document.querySelector('.sidebar-nav'), navEl);

      const render = () => {
        activeTab = tab; selectedStudentId = null; selectedClassId = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if (navEl) navEl.classList.add('active');
        document.getElementById('breadcrumb-current').textContent = Str.capitalize(tab);
        closeMobileSidebar();
        const c = document.getElementById('page-content');
        if (tab === 'dashboard') renderDashboard(c);
        else if (tab === 'classes') renderClasses(c);
        else if (tab === 'students') renderStudentsView(c);
      };

      Motion.transition(document.getElementById('page-content'), render);
    }

    function statCard(label, value, icon, gradient) {
      const valStr = String(value);
      const isNumber = /^[0-9]+(\.[0-9]+)?%?$/.test(valStr.trim());
      let valueHtml = valStr;
      if (isNumber) {
        const numPart = parseFloat(valStr);
        const suffix = valStr.includes('%') ? '%' : '';
        valueHtml = `<span class="count-up-value" data-target="${numPart}">${numPart}</span>${suffix}`;
      } else if (!valStr.includes('<span') && !valStr.includes('<div')) {
        valueHtml = Str.escHtml(valStr);
      }
      return `<div class="stat-card hover-lift">
        <div class="stat-card-icon" style="background:${gradient};color:white">${icon}</div>
        <div class="stat-card-value">${valueHtml}</div>
        <div class="stat-card-label">${label}</div>
      </div>`;
    }

    // ── Dashboard ────────────────────────────────────────────────
    function renderDashboard(container) {
      const students = scopedStudents();
      const faculty = scopedFaculty();
      const courses = scopedCourses();
      const scopeName = isPrincipal ? 'College' : (DB.Departments.getById(session.departmentId)?.name || 'Department');

      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">${scopeName} Overview</h1>
          <p class="page-subtitle">Students, faculty, classes and mentor coverage.</p>
        </div>
        <div class="stats-grid">
          ${statCard('No. of Students', students.length, Icons.users, 'linear-gradient(135deg, #4F46E5, #6366F1)')}
          ${statCard('No. of Faculties', faculty.length, Icons.user, 'linear-gradient(135deg, #0891B2, #06B6D4)')}
          ${statCard('No. of Classes', courses.length, Icons.grid, 'linear-gradient(135deg, #059669, #10B981)')}
          ${statCard('Requires Attention', students.filter(s => DB.Analytics.getStudentStatus(s.id) !== 'green').length, Icons.info, 'linear-gradient(135deg, #F59E0B, #FBBF24)')}
        </div>

        <div class="analytics-row">
          <div class="section-card">
            <div class="section-card-header"><div class="section-card-title">${Icons.grid} No. of Students by Class</div></div>
            <div class="section-card-body" style="padding:0">
              ${courses.map(c => {
                const cs = students.filter(s => s.courseId === c.id);
                const g = genderCounts(cs);
                return `<div style="padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-color);cursor:pointer" onclick="openClass('${c.id}')">
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                    <span class="font-semibold text-sm">${c.name}</span>
                    <span class="text-xs text-muted">${cs.length} students</span>
                  </div>
                  <div class="text-xs text-muted">Male ${g.male} · Female ${g.female} · Other ${g.other}</div>
                </div>`;
              }).join('') || '<div style="padding:var(--space-5);text-align:center;color:var(--text-tertiary)">No classes yet.</div>'}
            </div>
          </div>

          <div class="section-card">
            <div class="section-card-header"><div class="section-card-title">${Icons.user} Mentor Coverage (Students by Faculty)</div></div>
            <div class="section-card-body" style="padding:0">
              ${faculty.map(m => `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border-color)">
                  <div style="flex:1"><div class="font-semibold text-sm">${m.name}</div><div class="text-xs text-muted">${m.email}</div></div>
                  <span class="badge badge-blue">${DB.Assignments.getMentees(m.id).length} students</span>
                </div>`).join('') || '<div style="padding:var(--space-5);text-align:center;color:var(--text-tertiary)">No faculty yet.</div>'}
            </div>
          </div>
        </div>`;
    }

    function genderCounts(students) {
      const g = { male: 0, female: 0, other: 0 };
      students.forEach(s => {
        const gv = (DB.Profiles.get(s.id)?.gender || '').toLowerCase();
        if (gv === 'male' || gv === 'm') g.male++; else if (gv === 'female' || gv === 'f') g.female++; else g.other++;
      });
      return g;
    }

    // ── Classes tab (cards) ──────────────────────────────────────
    function classIncharge(course) {
      // in-charge = faculty in the class's department with the most mentees in that class
      const fac = scopedFaculty().filter(m => m.departmentId === course.departmentId);
      let best = null, bestN = -1;
      fac.forEach(m => {
        const n = DB.Assignments.getMentees(m.id).map(id => DB.Users.getById(id)).filter(s => s && s.courseId === course.id).length;
        if (n > bestN) { bestN = n; best = m; }
      });
      return bestN > 0 ? best : null;
    }

    function scopedClasses() {
      return DB.Classes.getAll().filter(c => isPrincipal || c.departmentId === session.departmentId);
    }

    function renderClasses(container) {
      const classes = scopedClasses();
      container.innerHTML = `
        <div class="page-header"><h1 class="page-title">Classes</h1><p class="page-subtitle">${classes.length} class(es).</p></div>
        <div class="class-grid">
          ${classes.map(c => {
            const cs = DB.Classes.getStudents(c.id);
            const g = genderCounts(cs);
            const inc = c.inchargeId ? DB.Users.getById(c.inchargeId) : null;
            const dept = DB.Departments.getById(c.departmentId);
            return `<div class="section-card class-card" onclick="openClass('${c.id}')">
              <div class="section-card-body">
                <div style="display:flex;justify-content:space-between;align-items:start">
                  <div>
                    <div class="font-semibold">${c.name}</div>
                    <div class="text-xs text-muted">${dept?.name || ''} · ${c.durationYears} yrs</div>
                  </div>
                  <button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();editClass('${c.id}')" title="Edit class">${Icons.edit}</button>
                </div>
                <hr class="divider">
                <div class="text-sm"><strong>In-charge:</strong> ${inc ? inc.name : '<span class="text-muted">— not set —</span>'}</div>
                <div class="text-sm mt-2"><strong>Students:</strong> ${cs.length}</div>
                <div class="flex gap-2 mt-3">
                  <span class="badge badge-blue">M ${g.male}</span>
                  <span class="badge badge-purple">F ${g.female}</span>
                  <span class="badge badge-gray">Other ${g.other}</span>
                </div>
              </div>
            </div>`;
          }).join('') || '<div class="empty-state"><p>No classes configured.</p></div>'}
        </div>`;
    }

    function openClass(classId) {
      const render = () => {
        selectedClassId = classId;
        const cls = DB.Classes.getById(classId);
        const students = DB.Classes.getStudents(classId).filter(s => isPrincipal || s.departmentId === session.departmentId);
        document.getElementById('breadcrumb-current').textContent = `Class: ${cls?.name || ''}`;
        const container = document.getElementById('page-content');
        
        container.innerHTML = `
          <button class="btn btn-secondary btn-sm back-btn" onclick="navigate('classes')">${Icons.chevronLeft} Back to Classes</button>
          
          <div class="page-header">
            <div style="display:flex;justify-content:space-between;align-items:center;width:100%;flex-wrap:wrap;gap:var(--space-3)">
              <div>
                <h1 class="page-title">${cls?.name || 'Class'}</h1>
                <p class="page-subtitle">${students.length} students · Year ${cls?.currentYear} / ${cls?.durationYears}</p>
              </div>
              <button class="btn btn-primary btn-sm hover-lift press-scale" onclick="showAddStudentsModal('${classId}')">
                ${Icons.plus} Add Students
              </button>
            </div>
          </div>

          <!-- Bulk Actions Toolbar -->
          <div id="bulk-actions-toolbar" class="bulk-toolbar" style="display:none;margin-bottom:var(--space-4);background:var(--bg-surface-2);padding:var(--space-3) var(--space-4);border-radius:var(--border-radius-md);border-left:4px solid var(--brand-primary);align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3)">
            <div class="text-sm font-semibold"><span id="selected-count">0</span> students selected</div>
            <div class="flex gap-2">
              <button class="btn btn-secondary btn-sm" onclick="bulkMoveClass()">${Icons.grid} Move Class</button>
              <button class="btn btn-secondary btn-sm" onclick="bulkAssignMentor()">${Icons.user} Assign Mentor</button>
              <button class="btn btn-secondary btn-sm text-warning" onclick="bulkRemoveFromClass()">${Icons.x} Remove from Class</button>
              <button class="btn btn-danger btn-sm" onclick="bulkDeleteStudents()">${Icons.trash} Delete</button>
            </div>
          </div>
          
          <div class="section-card">
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th style="width:40px"><input type="checkbox" id="select-all-class" onclick="toggleSelectAllClass(this.checked)"></th>
                    <th>Student</th>
                    <th>Roll No</th>
                    <th>Attendance (Current Sem)</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${students.map(s => rowForClassStudent(s)).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary);padding:var(--space-6)">No students in this class.</td></tr>`}
                </tbody>
              </table>
            </div>
          </div>`;
      };
      Motion.transition(document.getElementById('page-content'), render);
    }

    function rowForClassStudent(s) {
      const profile = DB.Profiles.get(s.id) || {};
      return `<tr>
        <td><input type="checkbox" class="student-select-cb" data-id="${s.id}" onchange="updateBulkToolbar()"></td>
        <td><div class="flex items-center gap-3">${renderAvatar(s.name,'sm',null,s.id)}<span class="font-semibold text-sm" style="view-transition-name:name-${s.id};width:fit-content">${Str.escHtml(s.name)}</span></div></td>
        <td class="text-sm">${Str.escHtml(profile.rollNo || '—')}</td>
        <td>${currentSemAttendance(s.id)}</td>
        <td>${renderStatusBadge(DB.Analytics.getStudentStatus(s.id))}</td>
        <td><div class="flex gap-2">
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="StudentReport.show('${s.id}','${session.role}')">${Icons.fileText} Report</button>
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="editStudentUser('${s.id}')" title="Edit">${Icons.edit}</button>
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="transferStudent('${s.id}')" title="Transfer">${Icons.link}</button>
          ${parentApprovalBtn(s)}
        </div></td>
      </tr>`;
    }

    function toggleSelectAllClass(checked) {
      document.querySelectorAll('.student-select-cb').forEach(cb => {
        cb.checked = checked;
      });
      updateBulkToolbar();
    }

    function updateBulkToolbar() {
      const checked = [...document.querySelectorAll('.student-select-cb')].filter(cb => cb.checked);
      const toolbar = document.getElementById('bulk-actions-toolbar');
      const countLabel = document.getElementById('selected-count');
      if (toolbar && countLabel) {
        if (checked.length > 0) {
          toolbar.style.display = 'flex';
          countLabel.textContent = checked.length;
        } else {
          toolbar.style.display = 'none';
          const selectAll = document.getElementById('select-all-class');
          if (selectAll) selectAll.checked = false;
        }
      }
    }

    function getSelectedStudentIds() {
      return [...document.querySelectorAll('.student-select-cb')].filter(cb => cb.checked).map(cb => cb.dataset.id);
    }

    function bulkMoveClass() {
      const ids = getSelectedStudentIds();
      if (!ids.length) return;
      const classes = DB.Classes.getAll().filter(c => isPrincipal || c.departmentId === session.departmentId);
      Modal.create('bulk-move', {
        title: `Move ${ids.length} Students`, size: 'sm',
        body: `
          <div class="form-group">
            <label class="form-label required">Select New Class</label>
            <select class="form-select" id="bm-class">
              <option value="">— Select Class —</option>
              ${classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
            </select>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('bulk-move')">Cancel</button>
                 <button class="btn btn-primary" onclick="doBulkMoveClass()">Move</button>`,
      });
    }

    function doBulkMoveClass() {
      const classId = document.getElementById('bm-class').value;
      if (!classId) { Toast.error('Select a class'); return; }
      const ids = getSelectedStudentIds();
      const cls = DB.Classes.getById(classId);
      ids.forEach(id => {
        DB.Users.update(id, { classId, courseId: cls?.courseId, departmentId: cls?.departmentId }, session.userId);
      });
      Toast.success('Moved', `${ids.length} students moved to ${cls.name}.`);
      Modal.close('bulk-move');
      openClass(selectedClassId);
    }

    function bulkAssignMentor() {
      const ids = getSelectedStudentIds();
      if (!ids.length) return;
      const faculty = DB.Users.getAll().filter(u => (u.role === 'mentor' || u.role === 'hod') && (isPrincipal || u.departmentId === session.departmentId));
      Modal.create('bulk-assign', {
        title: `Assign Mentor to ${ids.length} Students`, size: 'sm',
        body: `
          <div class="form-group">
            <label class="form-label required">Select Mentor</label>
            <select class="form-select" id="ba-mentor">
              <option value="">— Select Mentor —</option>
              ${faculty.map(f => `<option value="${f.id}">${f.name} (${roleLabel(f.role)})</option>`).join('')}
            </select>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('bulk-assign')">Cancel</button>
                 <button class="btn btn-primary" onclick="doBulkAssignMentor()">Assign</button>`,
      });
    }

    function doBulkAssignMentor() {
      const mentorId = document.getElementById('ba-mentor').value;
      if (!mentorId) { Toast.error('Select a mentor'); return; }
      const ids = getSelectedStudentIds();
      const mentor = DB.Users.getById(mentorId);
      ids.forEach(id => {
        DB.Assignments.assign(mentorId, id, session.userId);
      });
      Toast.success('Assigned', `${ids.length} students assigned to ${mentor.name}.`);
      Modal.close('bulk-assign');
      openClass(selectedClassId);
    }

    function bulkRemoveFromClass() {
      const ids = getSelectedStudentIds();
      if (!ids.length) return;
      Modal.confirm({
        title: `Remove ${ids.length} Students`,
        message: `Are you sure you want to remove these ${ids.length} students from this class? Their course details will be unlinked.`,
        confirmText: 'Remove',
        confirmClass: 'btn-danger',
        onConfirm: () => {
          ids.forEach(id => {
            DB.Users.update(id, { classId: null }, session.userId);
          });
          Toast.success('Removed', `${ids.length} students removed from class.`);
          openClass(selectedClassId);
        }
      });
    }

    function bulkDeleteStudents() {
      const ids = getSelectedStudentIds();
      if (!ids.length) return;
      Modal.confirm({
        title: `Delete ${ids.length} Students`,
        message: `This will permanently delete these ${ids.length} student accounts and all their records from the system. This cannot be undone.`,
        confirmText: 'Delete Permanently',
        confirmClass: 'btn-danger',
        onConfirm: () => {
          ids.forEach(id => {
            DB.Users.delete(id, session.userId);
          });
          Toast.success('Deleted', `${ids.length} student accounts deleted.`);
          openClass(selectedClassId);
        }
      });
    }

    function showAddStudentsModal(classId) {
      const cls = DB.Classes.getById(classId);
      const allStudents = DB.Users.getAll().filter(u => u.role === 'student' && u.classId !== classId);
      
      Modal.create('add-students', {
        title: `Add Students to ${cls?.name || 'Class'}`, size: 'md',
        body: `
          <div class="form-group">
            <input type="text" class="form-input" id="as-search" placeholder="Search students by name or email..." oninput="filterAddStudents()">
          </div>
          <div style="max-height:300px;overflow-y:auto;border:1px solid var(--border-color);border-radius:var(--border-radius-md);margin-top:var(--space-3)">
            <table class="data-table" style="font-size:13px">
              <thead>
                <tr>
                  <th style="width:40px"><input type="checkbox" id="as-select-all" onclick="toggleSelectAllAdd(this.checked)"></th>
                  <th>Student Name</th>
                  <th>Current Class</th>
                </tr>
              </thead>
              <tbody id="as-tbody">
                ${allStudents.map(s => {
                  const currentCls = s.classId ? DB.Classes.getById(s.classId) : null;
                  return `<tr class="as-row" data-name="${s.name.toLowerCase()}" data-email="${s.email.toLowerCase()}">
                    <td><input type="checkbox" class="as-student-cb" data-id="${s.id}"></td>
                    <td>
                      <div class="font-semibold">${Str.escHtml(s.name)}</div>
                      <div class="text-xs text-muted">${Str.escHtml(s.email)}</div>
                    </td>
                    <td>${currentCls ? `<span class="badge badge-blue">${Str.escHtml(currentCls.name)}</span>` : '<span class="text-muted">None</span>'}</td>
                  </tr>`;
                }).join('') || `<tr><td colspan="3" style="text-align:center;color:var(--text-tertiary);padding:var(--space-4)">No students available to add.</td></tr>`}
              </tbody>
            </table>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('add-students')">Cancel</button>
                 <button class="btn btn-primary" onclick="doAddStudents('${classId}')">Add Selected</button>`,
      });
    }

    function toggleSelectAllAdd(checked) {
      document.querySelectorAll('.as-student-cb').forEach(cb => {
        cb.checked = checked;
      });
    }

    function filterAddStudents() {
      const query = document.getElementById('as-search').value.toLowerCase();
      document.querySelectorAll('.as-row').forEach(row => {
        const name = row.dataset.name;
        const email = row.dataset.email;
        if (name.includes(query) || email.includes(query)) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    function doAddStudents(classId) {
      const checkedCbs = [...document.querySelectorAll('.as-student-cb')].filter(cb => cb.checked);
      if (!checkedCbs.length) { Toast.error('Select at least one student'); return; }
      
      const cls = DB.Classes.getById(classId);
      checkedCbs.forEach(cb => {
        const studentId = cb.dataset.id;
        DB.Users.update(studentId, { classId, courseId: cls?.courseId, departmentId: cls?.departmentId }, session.userId);
      });

      Toast.success('Success', `${checkedCbs.length} students added to class.`);
      Modal.close('add-students');
      openClass(classId);
    }

    function currentSemAttendance(studentId, returnVal = false) {
      const recs = DB.SemesterRecords.getAll(studentId);
      const latest = recs[recs.length - 1];
      if (!latest || latest.attendance == null) return returnVal ? null : '—';
      return returnVal ? latest.attendance : renderAttendanceRing(latest.attendance);
    }

    function rowForStudent(s) {
      const profile = DB.Profiles.get(s.id) || {};
      const course = DB.Courses.getById(s.courseId);
      return `<tr>
        <td><div class="flex items-center gap-3">${renderAvatar(s.name,'sm',null,s.id)}<span class="font-semibold text-sm" style="view-transition-name:name-${s.id};width:fit-content">${Str.escHtml(s.name)}</span></div></td>
        <td class="text-sm">${Str.escHtml(profile.rollNo || '—')}</td>
        <td>${currentSemAttendance(s.id)}</td>
        <td>${renderStatusBadge(DB.Analytics.getStudentStatus(s.id))}</td>
        <td><div class="flex gap-2">
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="StudentReport.show('${s.id}','${session.role}')">${Icons.fileText} Report</button>
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="editStudentUser('${s.id}')" title="Edit">${Icons.edit}</button>
          <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="transferStudent('${s.id}')" title="Transfer">${Icons.link}</button>
          ${parentApprovalBtn(s)}
        </div></td>
      </tr>`;
    }

    // Visible parent-approval control (HOD/Principal)
    function parentApprovalBtn(s) {
      if (!s.parentEmail) return `<span class="badge badge-gray" title="No parent email set">No parent</span>`;
      return s.parentApproved
        ? `<button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="setParentApproval('${s.id}',false)" title="Revoke parent access"><span class="badge badge-green">${Icons.check} Parent OK</span></button>`
        : `<button class="btn btn-primary btn-sm hover-lift press-scale" onclick="setParentApproval('${s.id}',true)">Approve Parent</button>`;
    }
    function setParentApproval(studentId, approve) {
      if (approve) DB.ParentLinks.approve(studentId, session.userId);
      else DB.ParentLinks.revoke(studentId, session.userId);
      Toast.success(approve ? 'Parent Approved' : 'Access Revoked', approve ? 'Parent can now view the report.' : 'Parent access revoked.');
      navigate(activeTab);
    }

    // ── Students View (table) ────────────────────────────────────
    function renderStudentsView(container) {
      const students = scopedStudents().sort((a, b) => a.name.localeCompare(b.name));
      container.innerHTML = `
        <div class="page-header">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-3)">
            <div><h1 class="page-title">Students</h1><p class="page-subtitle">${students.length} students${isPrincipal ? ' (college-wide)' : ''}.</p></div>
            <button class="btn btn-secondary" onclick="exportAccreditationReport()">${Icons.download} Export CSV</button>
          </div>
        </div>
        <div class="section-card"><div class="table-wrapper"><table class="data-table">
          <thead><tr><th>Student</th><th>Class</th><th>Attendance (Current Sem)</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${students.map(s => {
            const course = DB.Courses.getById(s.courseId);
            return `<tr>
              <td><div class="flex items-center gap-3">${renderAvatar(s.name,'sm',null,s.id)}<span class="font-semibold text-sm" style="view-transition-name:name-${s.id};width:fit-content">${Str.escHtml(s.name)}</span></div></td>
              <td class="text-sm">${Str.escHtml(course?.name || '—')}</td>
              <td>${currentSemAttendance(s.id)}</td>
              <td>${renderStatusBadge(DB.Analytics.getStudentStatus(s.id))}</td>
              <td><div class="flex gap-2">
                <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="StudentReport.show('${s.id}','${session.role}')">${Icons.fileText} Report</button>
                <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="editStudentUser('${s.id}')" title="Edit">${Icons.edit}</button>
                <button class="btn btn-secondary btn-sm hover-lift press-scale" onclick="transferStudent('${s.id}')" title="Transfer">${Icons.link}</button>
                ${parentApprovalBtn(s)}
              </div></td>
            </tr>`;
          }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-tertiary);padding:var(--space-6)">No students.</td></tr>'}</tbody>
        </table></div></div>`;
    }

    // ── Edit student user (HOD can update Teachers/Students/Parents) ──
    function editStudentUser(studentId) {
      const s = DB.Users.getById(studentId);
      const p = DB.Profiles.get(studentId) || {};
      Modal.create('edit-stu', {
        title: `Edit — ${s.name}`, size: 'sm',
        body: `
          <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="es-name" value="${s.name}"></div>
          <div class="form-group"><label class="form-label">Gender</label>
            <select class="form-select" id="es-gender">
              ${['','Male','Female','Other'].map(g => `<option value="${g}" ${(p.gender||'')===g?'selected':''}>${g||'— select —'}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Parent Email</label><input class="form-input" id="es-parent" value="${s.parentEmail||''}" placeholder="parent@email.com">
            <div class="form-hint">Editable by Teacher, HOD, Principal and Admin.</div></div>
          <div class="setting-row" style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-2) 0">
            <span class="text-sm">Parent access approved</span>
            <input type="checkbox" id="es-approved" ${s.parentApproved?'checked':''}>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="resetStudentPassword('${studentId}')">Reset Password</button>
                 <button class="btn btn-secondary" onclick="Modal.close('edit-stu')">Cancel</button>
                 <button class="btn btn-primary" onclick="saveStudentUser('${studentId}')">Save</button>`,
      });
    }
    function resetStudentPassword(studentId) {
      const u = DB.Users.getById(studentId);
      Modal.confirm({ title: 'Reset Password', message: `Reset ${u.name}'s password to the default (<strong>${DB.getDefaultPassword()}</strong>)?`, confirmText: 'Reset', confirmClass: 'btn-primary', onConfirm: () => {
        DB.Users.resetPassword(studentId, session.userId);
        Toast.success('Password reset', `${u.name} can log in with the default password.`);
      }});
    }

    function saveStudentUser(studentId) {
      const name = document.getElementById('es-name').value.trim();
      const gender = document.getElementById('es-gender').value;
      const parentEmail = document.getElementById('es-parent').value.trim().toLowerCase();
      const approved = document.getElementById('es-approved').checked;
      DB.Users.update(studentId, { name, parentEmail: parentEmail || null, parentApproved: approved }, session.userId);
      DB.Profiles.save(studentId, { ...(DB.Profiles.get(studentId)||{}), gender }, session.userId);
      if (parentEmail) DB.ParentLinks.setParentEmail(studentId, parentEmail, session.userId);
      Toast.success('Saved', 'Student updated.');
      Modal.close('edit-stu');
      navigate(activeTab);
    }

    // ── Transfer student to another Teacher / Class ──────────────
    function transferStudent(studentId) {
      const s = DB.Users.getById(studentId);
      const faculty = DB.Users.getAll().filter(u => (u.role === 'mentor' || u.role === 'hod') && (isPrincipal || u.departmentId === session.departmentId));
      const classes = DB.Classes.getAll().filter(c => isPrincipal || c.departmentId === session.departmentId);
      const currentMentor = DB.Assignments.getMentor(studentId);
      Modal.create('transfer', {
        title: `Transfer — ${s.name}`, size: 'sm',
        body: `
          <div class="form-group"><label class="form-label">Assign to Teacher (Mentor)</label>
            <select class="form-select" id="tr-mentor">
              <option value="">— Keep current —</option>
              ${faculty.map(m => `<option value="${m.id}" ${currentMentor===m.id?'selected':''}>${m.name} (${roleLabel(m.role)})</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Move to Class</label>
            <select class="form-select" id="tr-class">
              <option value="">— Keep current —</option>
              ${classes.map(c => `<option value="${c.id}" ${s.classId===c.id?'selected':''}>${c.name}</option>`).join('')}
            </select>
          </div>
          <div class="alert alert-info">${Icons.info} Transferring updates the student's mentor and/or class for the next academic period.</div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('transfer')">Cancel</button>
                 <button class="btn btn-primary" onclick="doTransfer('${studentId}')">Transfer</button>`,
      });
    }
    function doTransfer(studentId) {
      const mentorId = document.getElementById('tr-mentor').value;
      const classId = document.getElementById('tr-class').value;
      if (mentorId) DB.Assignments.assign(mentorId, studentId, session.userId);
      if (classId) {
        const cls = DB.Classes.getById(classId);
        DB.Users.update(studentId, { classId, courseId: cls?.courseId, departmentId: cls?.departmentId }, session.userId);
      }
      Toast.success('Transferred', 'Student reassigned.');
      Modal.close('transfer');
      navigate(activeTab);
    }

    // ── Edit class (course) ──────────────────────────────────────
    // ── Edit class ──────────────────────────────────────
    function editClass(classId) {
      const cls = DB.Classes.getById(classId);
      const courses = DB.Courses.getAll().filter(c => isPrincipal || c.departmentId === session.departmentId);
      const faculty = DB.Users.getAll().filter(u => (u.role === 'mentor' || u.role === 'hod') && (isPrincipal || u.departmentId === session.departmentId));
      const [mm, dd] = (cls?.promotionDate || '06-01').split('-');
      Modal.create('edit-class', {
        title: `Edit Class — ${cls?.name || ''}`, size: 'md',
        body: `
          <div class="form-grid">
            <div class="form-group"><label class="form-label required">Year</label>
              <select class="form-select" id="ec-year">${[1,2,3,4,5,6].map(y=>`<option value="${y}" ${cls?.currentYear===y?'selected':''}>${y}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label class="form-label required">Course</label>
              <select class="form-select" id="ec-course">${courses.map(c=>`<option value="${c.id}" data-code="${c.code||''}" ${cls?.courseId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label class="form-label required">Batch</label>
              <select class="form-select" id="ec-batch">${['A','B','C','D'].map(b=>`<option value="${b}" ${cls?.batch===b?'selected':''}>${b}</option>`).join('')}</select>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label class="form-label required">Course Duration (years)</label><input type="number" class="form-input" id="ec-dur" value="${cls?.durationYears||3}" min="1" max="6"></div>
            <div class="form-group"><label class="form-label">Promotion Date</label><input type="date" class="form-input" id="ec-promo" value="2026-${mm}-${dd}"></div>
            <div class="form-group"><label class="form-label">Class In-charge</label>
              <select class="form-select" id="ec-incharge"><option value="">— None —</option>${faculty.map(f=>`<option value="${f.id}" ${cls?.inchargeId===f.id?'selected':''}>${f.name} (${roleLabel(f.role)})</option>`).join('')}</select>
            </div>
          </div>`,
        footer: `<button class="btn btn-secondary" onclick="Modal.close('edit-class')">Cancel</button>
                 <button class="btn btn-primary" onclick="saveClass('${classId}')">Save</button>`,
      });
    }

    function saveClass(classId) {
      const year = document.getElementById('ec-year').value;
      const courseSel = document.getElementById('ec-course');
      const courseId = courseSel.value;
      const courseCode = courseSel.options[courseSel.selectedIndex]?.dataset.code || '';
      const batch = document.getElementById('ec-batch').value;
      const durationYears = document.getElementById('ec-dur').value;
      const promo = document.getElementById('ec-promo').value;
      const promotionDate = promo ? promo.slice(5) : '06-01';
      const inchargeId = document.getElementById('ec-incharge').value || null;
      
      const cls = DB.Classes.getById(classId);
      const data = { currentYear: year, courseId, courseCode, batch, durationYears, promotionDate, inchargeId };
      DB.Classes.update(classId, data, session.userId);
      Toast.success('Saved', 'Class updated.');
      Modal.close('edit-class');
      navigate('classes');
    }

    // ── NAAC / accreditation CSV ─────────────────────────────────
    function exportAccreditationReport() {
      const students = scopedStudents();
      const rows = students.map(s => {
        const profile = DB.Profiles.get(s.id) || {};
        const recs = DB.SemesterRecords.getAll(s.id);
        const latest = recs[recs.length - 1] || {};
        const ov = StudentReport.overview(s.id);
        return {
          'Student Name': s.name, 'Email': s.email, 'Roll No': profile.rollNo || '',
          'Class': DB.Courses.getById(s.courseId)?.name || '',
          'Latest SGPA': latest.gradePoint || 'No Data', 'Grade': latest.grade || 'No Data',
          'Latest Attendance (%)': latest.attendance || 'No Data',
          'Semesters Passed': ov.passed, 'Semesters Failed': ov.failed,
          'Status': DB.Analytics.getStudentStatus(s.id),
        };
      });
      exportCSV(rows, `Report_${isPrincipal ? 'College' : 'Dept'}_${DateFmt.today()}.csv`);
      Toast.success('Report Exported', 'CSV summary generated.');
    }
  </script>
</body>
</html>
